{% extends "base.html" %}
{% block title %}注册 — 储能电力政策库{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-brand-900 rounded-2xl mb-4 shadow-lg">
        <svg class="w-8 h-8 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
          <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">创建账号</h1>
      <p class="text-gray-500 text-sm mt-1">免费注册，浏览全部政策文件</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/register" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
          <input type="text" name="username" required autocomplete="username" minlength="2"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="至少 2 个字符">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
          <input type="password" name="password" required autocomplete="new-password" minlength="6"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="至少 6 个字符">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">确认密码</label>
          <input type="password" name="password2" required autocomplete="new-password" minlength="6"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="再次输入密码">
        </div>
        <button type="submit"
          class="w-full bg-brand-900 hover:bg-blue-800 text-white py-3 rounded-xl font-semibold text-sm transition-colors mt-2">
          注册
        </button>
      </form>

      <!-- 功能说明 -->
      <div class="mt-6 pt-5 border-t border-gray-100 space-y-2">
        <div class="flex items-center gap-2 text-xs text-gray-500">
          <svg class="w-4 h-4 text-green-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
          免费浏览全部储能/电力政策
        </div>
        <div class="flex items-center gap-2 text-xs text-gray-500">
          <svg class="w-4 h-4 text-green-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
          按省份、层级、类型多维筛选
        </div>
        <div class="flex items-center gap-2 text-xs text-gray-400">
          <svg class="w-4 h-4 text-yellow-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          <span><strong class="text-gray-600">PRO</strong>：AI 智能检索 + AI 政策深度解读</span>
        </div>
      </div>

      <p class="text-center text-sm text-gray-500 mt-5">
        已有账号？
        <a href="/login" class="text-blue-600 hover:underline font-medium">立即登录</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
