<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>储能政策情报看板 v4</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* 基础配色（Linear/SaaS Dashboard 风格） */
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --surface-2: #f8fafc;
      --border: #e5e7eb;

      --text: #0f172a;
      --text-muted: #475569;
      --text-xs: #94a3b8;

      /* Primary / Accent（紫蓝渐变） */
      --accent: #6366f1;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eef2ff;
      --primary-grad: linear-gradient(135deg, #6366f1 0%, #2563eb 70%, #0ea5e9 120%);

      /* Layout */
      --sidebar-w: 248px;
      --radius: 12px;

      /* Shadow / Focus */
      --shadow: 0 1px 2px rgba(15,23,42,.06), 0 10px 28px rgba(15,23,42,.08);
      --shadow-hover: 0 14px 42px rgba(15,23,42,.14);
      --ring: 0 0 0 4px rgba(99,102,241,.18);

      /* Semantic */
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    /* Header */
    header { background:#0f172a; color:#fff; height:52px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 10px rgba(0,0,0,.2); }
    .logo { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .logo-sub { font-size:11px; color:#94a3b8; font-weight:400; margin-left:4px; }
    .header-left { display:flex; align-items:center; gap:10px; min-width:0; }
    .hamburger-btn { display:none; width:34px; height:34px; border-radius:10px; background:rgba(30,41,59,.45); border:1px solid rgba(148,163,184,.25); color:#e2e8f0; cursor:pointer; font-size:18px; line-height:1; align-items:center; justify-content:center; }
    .hamburger-btn:hover { background:rgba(51,65,85,.55); border-color:rgba(148,163,184,.35); }
    .header-right { display:flex; align-items:center; gap:16px; }
    .header-stats { display:flex; gap:18px; font-size:12px; color:#94a3b8; }
    .header-stats strong { color:#e2e8f0; }
    .header-time { font-size:12px; color:#94a3b8; padding:4px 10px; border:1px solid rgba(148,163,184,.25); border-radius:999px; background:rgba(30,41,59,.35); }
    .btn-logout { padding:6px 14px; border-radius:10px; background:rgba(30,41,59,.55); border:1px solid rgba(148,163,184,.25); color:#cbd5e1; font-size:12px; cursor:pointer; transition:transform .12s, background .12s, border-color .12s; }
    .btn-logout:hover { transform:translateY(-1px); background:rgba(51,65,85,.65); border-color:rgba(148,163,184,.35); }
    .btn-login-header { padding:6px 16px; border-radius:999px; background:var(--primary-grad); border:none; color:#fff; font-size:12px; font-weight:700; cursor:pointer; transition:transform .12s, filter .12s, box-shadow .12s; box-shadow:0 10px 24px rgba(37,99,235,.18); }
    .btn-login-header:hover { transform:translateY(-1px); filter:saturate(1.05); }
    .user-badge { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:8px; min-width:0; }
    .user-avatar { width:26px; height:26px; border-radius:999px; background:rgba(96,165,250,.18); border:1px solid rgba(96,165,250,.35); color:#bfdbfe; display:inline-flex; align-items:center; justify-content:center; font-weight:850; font-size:12px; flex-shrink:0; }
    .user-name { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .user-name strong { color:#60a5fa; }
    .notif-badge { display:inline-flex; align-items:center; justify-content:center; background:#ef4444; color:#fff; font-size:10px; font-weight:700; border-radius:10px; min-width:18px; height:18px; padding:0 5px; margin-left:4px; }

    /* Public Banner */
    .public-banner { background:linear-gradient(135deg,#1e40af,#2563eb); color:#fff; padding:32px 24px 28px; text-align:center; }
    .public-banner h1 { font-size:24px; font-weight:800; margin-bottom:6px; }
    .public-banner p { font-size:13px; opacity:.85; max-width:560px; margin:0 auto 18px; line-height:1.7; }
    .public-badge { display:inline-block; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); border-radius:20px; padding:3px 14px; font-size:12px; margin-bottom:12px; }
    .public-login-hint { font-size:12px; opacity:.75; }
    .public-login-hint button { background:none; border:none; color:#bfdbfe; cursor:pointer; font-size:12px; text-decoration:underline; }
    .public-stats-row { display:flex; justify-content:center; gap:32px; margin-top:16px; }
    .public-stat { text-align:center; }
    .public-stat-v { font-size:28px; font-weight:800; }
    .public-stat-l { font-size:11px; opacity:.75; margin-top:2px; }

    /* Auth */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(3px); }
    .modal-box { background:#fff; border-radius:16px; padding:36px 40px; width:380px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
    .modal-logo { text-align:center; font-size:28px; margin-bottom:6px; }
    .modal-title { text-align:center; font-size:20px; font-weight:700; color:#0f172a; margin-bottom:4px; }
    .modal-sub { text-align:center; font-size:12px; color:#94a3b8; margin-bottom:24px; }
    .auth-tabs { display:flex; border-bottom:2px solid #e2e8f0; margin-bottom:22px; }
    .auth-tab { flex:1; padding:8px 0; text-align:center; font-size:14px; font-weight:600; color:#94a3b8; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
    .auth-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12px; font-weight:600; color:#475569; margin-bottom:6px; }
    .form-input { width:100%; padding:9px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; color:var(--text); background:#f8fafc; outline:none; transition:border-color .15s; }
    .form-input:focus { border-color:var(--primary); background:#fff; }
    .btn-primary {
      width:100%;
      padding:10px 12px;
      background:var(--primary-grad);
      color:#fff;
      border:none;
      border-radius:12px;
      font-size:14px;
      font-weight:750;
      cursor:pointer;
      transition:transform .12s, filter .12s, box-shadow .12s;
      margin-top:4px;
      box-shadow:0 14px 30px rgba(37,99,235,.18);
    }
    .btn-primary:hover { transform:translateY(-1px); filter:saturate(1.04); }
    .btn-primary:focus { outline:none; box-shadow:var(--ring), 0 14px 30px rgba(37,99,235,.18); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    .auth-error { background:#fef2f2; border:1px solid #fca5a5; color:#991b1b; border-radius:8px; padding:8px 12px; font-size:12px; margin-bottom:14px; }
    .auth-hint { text-align:center; font-size:11px; color:#94a3b8; margin-top:14px; }

    /* App Shell（已登录：左侧 Sidebar 导航） */
    .app-shell { display:flex; gap:14px; padding:14px; align-items:flex-start; }
    .nav-sidebar {
      width:var(--sidebar-w);
      flex-shrink:0;
      position:sticky;
      top:68px;
      max-height:calc(100vh - 80px);
      overflow:auto;
      border-radius:16px;
      background:#111827;
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 18px 40px rgba(2,6,23,.30);
      padding:12px;
    }
    .nav-title { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:rgba(226,232,240,.65); font-weight:800; padding:6px 8px 10px; }
    .nav-items { display:flex; flex-direction:column; gap:6px; }
    .nav-item {
      position:relative;
      width:100%;
      text-align:left;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid transparent;
      background:transparent;
      color:rgba(226,232,240,.86);
      cursor:pointer;
      font-size:13px;
      font-weight:650;
      transition:transform .12s, background .12s, border-color .12s;
      overflow:hidden;
    }
    .nav-item:hover { transform:translateY(-1px); background:rgba(15,23,42,.65); border-color:rgba(148,163,184,.14); }
    .nav-item.active { background:rgba(15,23,42,.70); border-color:rgba(99,102,241,.35); }
    .nav-item.active::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--primary-grad); border-radius:12px 0 0 12px; }
    .nav-item-label { display:flex; align-items:center; justify-content:space-between; gap:10px; position:relative; z-index:2; }
    .nav-item-glow {
      position:absolute; inset:-40px -60px;
      background:radial-gradient(closest-side, rgba(99,102,241,.26), transparent 70%);
      opacity:.9;
      transform:translateX(-18px);
      pointer-events:none;
    }
    .nav-footer {
      margin-top:12px;
      padding:12px 10px;
      border-top:1px solid rgba(255,255,255,.08);
      color:rgba(226,232,240,.72);
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .nav-foot-stat { display:flex; justify-content:space-between; align-items:center; font-size:12px; }
    .nav-foot-stat .k { color:rgba(148,163,184,.8); }
    .nav-foot-stat .v { font-variant-numeric:tabular-nums; font-weight:800; color:#e2e8f0; }
    .nav-foot-hint { font-size:11px; color:rgba(148,163,184,.72); line-height:1.5; }

    .app-main { flex:1; min-width:0; padding:2px 2px 18px; }

    /* 页面 Layout（列表页：筛选 sidebar + 内容区） */
    .main-layout { display:flex; width:100%; padding:16px 14px; gap:16px; align-items:flex-start; }
    .sidebar { width:var(--sidebar-w); flex-shrink:0; position:sticky; top:68px; max-height:calc(100vh - 80px); overflow-y:auto; scrollbar-width:thin; }
    .sidebar::-webkit-scrollbar { width:4px; }
    .sidebar::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
    .filter-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:14px 14px 10px; margin-bottom:10px; box-shadow:var(--shadow); }
    .filter-title { font-size:11px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:5px; }
    .filter-section { margin-bottom:12px; }
    .filter-label { font-size:11px; color:var(--text-muted); font-weight:600; margin-bottom:6px; display:block; }
    select, input[type=text] { width:100%; padding:6px 9px; border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--text); background:#fff; outline:none; }
    select:focus, input[type=text]:focus { border-color:var(--primary); }
    .chip-group { display:flex; flex-wrap:wrap; gap:5px; }
    .chip { padding:3px 9px; border-radius:999px; border:1px solid var(--border); background:#fff; font-size:11px; cursor:pointer; color:var(--text-muted); transition:transform .12s, box-shadow .12s, border-color .12s, color .12s, background .12s; white-space:nowrap; line-height:1.5; }
    .chip:hover { transform:translateY(-1px); box-shadow:0 12px 24px rgba(15,23,42,.08); border-color:rgba(99,102,241,.35); color:var(--text); }
    .chip.active { background:var(--primary-grad); border-color:transparent; color:#fff; }
    .chip:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; transform:none; }
    .cat-chip { padding:3px 9px; border-radius:20px; border:1.5px solid transparent; font-size:11px; cursor:pointer; transition:all .12s; white-space:nowrap; }
    .btn-reset { width:100%; padding:7px; background:#f8fafc; border:1px solid var(--border); border-radius:6px; font-size:11px; cursor:pointer; color:var(--text-muted); margin-top:4px; }
    .btn-reset:hover { background:#e2e8f0; }
    .active-filters { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; align-items:center; }
    .active-filters.prominent { padding:10px 10px 8px; background:#fffbeb; border:1px solid #fde68a; border-radius:12px; box-shadow:var(--shadow); }
    .af-label { font-size:11px; color:#92400e; font-weight:800; margin-right:4px; }
    .af-pill { display:inline-flex; align-items:center; gap:4px; background:var(--primary-light); color:var(--primary); border-radius:20px; font-size:11px; padding:2px 8px; font-weight:500; }
    .af-pill button { background:none; border:none; cursor:pointer; font-size:12px; line-height:1; color:var(--primary); padding:0; }
    .content { flex:1; min-width:0; }

    /* View tabs */
    .view-tabs { display:flex; gap:0; margin-bottom:14px; flex-wrap:wrap; }
    .view-tab { padding:7px 16px; font-size:13px; font-weight:600; border:1.5px solid var(--border); background:#fff; cursor:pointer; color:var(--text-muted); transition:all .14s; white-space:nowrap; }
    .view-tab:first-child { border-radius:8px 0 0 8px; }
    .view-tab:last-child { border-radius:0 8px 8px 0; border-left:none; }
    .view-tab:not(:first-child):not(:last-child) { border-left:none; }
    .view-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .view-tab-inner { display:flex; align-items:center; gap:4px; }

    /* Dashboard */
    .dash-section-title { font-size:13px; font-weight:700; color:#0f172a; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .dash-section-title .updated { font-size:11px; font-weight:400; color:#94a3b8; }
    .stat-cards { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
    .stat-card {
      position:relative;
      background:var(--card-bg);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px 18px 14px 18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }
    .stat-card::before {
      content:"";
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:4px;
      background:var(--stat-accent, var(--primary));
    }
    .stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-hover); border-color:rgba(99,102,241,.25); }
    .stat-card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .stat-card-label { font-size:12px; color:var(--text-muted); font-weight:650; letter-spacing:.01em; }
    .stat-card-ico { font-size:14px; opacity:.9; }
    .stat-card-value { font-size:30px; font-weight:850; color:var(--text); letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
    .stat-card-sub { font-size:11px; color:var(--text-xs); margin-top:2px; display:flex; align-items:center; gap:6px; }
    .mini-trend { font-size:11px; color:rgba(99,102,241,.9); background:rgba(99,102,241,.12); border:1px solid rgba(99,102,241,.22); padding:1px 7px; border-radius:999px; font-weight:700; }
    .matrix-wrap { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-bottom:16px; }
    .matrix-table { width:100%; border-collapse:collapse; font-size:12px; }
    .matrix-table th { background:#f8fafc; padding:10px 12px; text-align:left; font-weight:600; color:#475569; border-bottom:1px solid var(--border); white-space:nowrap; }
    .matrix-table th.num { text-align:right; }
    .matrix-table td { padding:8px 12px; border-bottom:1px solid #f1f5f9; color:#334155; }
    .matrix-table tr:last-child td { border-bottom:none; }
    .matrix-table tr:hover td { background:#f8fafc; }
    .matrix-table td.region-name { font-weight:600; color:#0f172a; }
    .matrix-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .heat-cell { display:inline-block; min-width:36px; padding:2px 8px; border-radius:5px; text-align:center; font-weight:600; font-size:12px; }
    .total-badge { display:inline-block; min-width:36px; padding:2px 8px; border-radius:5px; text-align:center; font-weight:700; font-size:12px; background:#0f172a; color:#fff; }
    .latest-wrap { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .latest-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; border-bottom:1px solid var(--border); }
    .latest-header-title { font-size:13px; font-weight:700; color:#0f172a; }
    .btn-view-all { font-size:12px; color:var(--primary); cursor:pointer; background:none; border:none; font-weight:600; }
    .btn-view-all:hover { text-decoration:underline; }
    .latest-item { display:flex; align-items:flex-start; gap:10px; padding:10px 16px; border-bottom:1px solid #f1f5f9; cursor:pointer; transition:background .12s; }
    .latest-item:last-child { border-bottom:none; }
    .latest-item:hover { background:#f8fafc; }
    .latest-bucket { flex-shrink:0; margin-top:2px; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; min-width:36px; text-align:center; }
    .bucket-policy { background:#dbeafe; color:#1e40af; }
    .bucket-subsidy { background:#d1fae5; color:#065f46; }
    .bucket-tender { background:#fef3c7; color:#92400e; }
    .bucket-compliance { background:#fee2e2; color:#991b1b; }
    .latest-body { flex:1; min-width:0; }
    .latest-title { font-size:13px; font-weight:500; color:#0f172a; line-height:1.5; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; }
    .latest-meta { display:flex; gap:8px; margin-top:3px; flex-wrap:wrap; }
    .latest-date { font-size:11px; color:#94a3b8; }
    .latest-source { font-size:11px; color:#64748b; }
    .latest-region { font-size:11px; color:#16a34a; background:#f0fdf4; padding:0 5px; border-radius:3px; }

    /* Dashboard Viz Grid */
    .viz-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-bottom:16px; }
    .viz-card-map { grid-column: 1 / -1; } /* 地图独占一整行 */
    .viz-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 14px 10px; position:relative; overflow:hidden; transition:transform .14s, box-shadow .14s, border-color .14s; }
    .viz-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-hover); border-color:rgba(99,102,241,.22); }
    .viz-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .viz-title { font-size:13px; font-weight:800; color:var(--text); }
    .viz-sub { font-size:11px; color:var(--text-xs); margin-top:2px; }
    .viz-legend { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .viz-legend .it { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-muted); }
    .viz-legend .dot { width:10px; height:10px; border-radius:3px; }
    .viz-tooltip { position:absolute; pointer-events:none; background:#0b1020; color:#fff; padding:6px 8px; border-radius:10px; font-size:11px; box-shadow:0 18px 46px rgba(2,6,23,.40); transform:translate(10px,-10px); white-space:nowrap; z-index:10; }
    @media (max-width: 980px){ .viz-grid{ grid-template-columns:1fr; } }

    /* Trend Chart */
    .chart-wrap { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:16px; }
    .chart-title-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .chart-seg { display:flex; gap:0; }
    .chart-seg-btn { padding:3px 12px; font-size:11px; font-weight:600; border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--text-muted); transition:all .14s; }
    .chart-seg-btn:first-child { border-radius:5px 0 0 5px; }
    .chart-seg-btn:last-child { border-radius:0 5px 5px 0; border-left:none; }
    .chart-seg-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .chart-container { height:auto; min-height:300px; position:relative; width:100%; overflow-x:auto; }
    .chart-subtitle { font-size:12px; color:#64748b; margin:-4px 0 10px; }
    .chart-tooltip { position:absolute; pointer-events:none; background:#0f172a; color:#fff; padding:6px 8px; border-radius:8px; font-size:11px; box-shadow:0 10px 30px rgba(0,0,0,.18); transform:translate(10px,-10px); white-space:nowrap; z-index:5; }

    /* Top Keywords */
    .keyword-wrap { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:16px; }
    .keyword-cloud { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .keyword-chip { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; cursor:default; border:1px solid; transition:transform .1s; }
    .keyword-chip:hover { transform:scale(1.05); }

    /* Version Timeline */
    .version-timeline { display:flex; flex-direction:column; gap:0; position:relative; }
    .version-timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:#e2e8f0; }
    .version-item { display:flex; align-items:flex-start; gap:12px; padding:6px 0; position:relative; }
    .version-dot { width:18px; height:18px; border-radius:50%; background:var(--primary); border:3px solid #fff; box-shadow:0 0 0 2px var(--primary); flex-shrink:0; margin-top:2px; z-index:1; }
    .version-dot.first { background:#16a34a; box-shadow:0 0 0 2px #16a34a; }
    .version-dot.last { background:#f59e0b; box-shadow:0 0 0 2px #f59e0b; }
    .version-info { flex:1; min-width:0; }
    .version-label { font-size:12px; font-weight:600; color:#334155; }
    .version-time { font-size:11px; color:#94a3b8; }

    /* Search & List */
    .search-row { display:flex; gap:8px; margin-bottom:12px; }
    .search-row input { flex:1; height:36px; font-size:13px; }
    .btn-search { height:36px; padding:0 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; white-space:nowrap; }
    .btn-search:hover { background:var(--primary-hover); }
    .result-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:12px; color:var(--text-muted); }
    .result-bar strong { color:var(--text); font-size:14px; }
    .item-list { display:flex; flex-direction:column; gap:10px; }
    .item-card {
      background:var(--card-bg);
      border:1px solid var(--border);
      border-left:4px solid transparent;
      border-radius:var(--radius);
      padding:14px 16px;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease, border-left-color .14s ease;
    }
    .item-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-hover); border-color:rgba(99,102,241,.20); border-left-color:var(--accent); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:6px; }
    .card-title { font-size:15px; font-weight:750; color:var(--text); line-height:1.45; flex:1; letter-spacing:-.01em; }
    .card-title a { color:inherit; text-decoration:none; }
    .card-title a:hover { color:var(--primary); text-decoration:underline; }
    .card-meta-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
    .card-date { font-size:12px; color:var(--text-muted); white-space:nowrap; }
    .card-docno { font-size:10px; color:var(--text-xs); font-family:monospace; }
    .card-summary { font-size:12px; color:var(--text-muted); line-height:1.7; margin-bottom:9px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-footer { display:flex; flex-wrap:wrap; align-items:center; gap:5px; }
    .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; font-weight:650; white-space:nowrap; }
    .badge-source { background:var(--primary-light); color:var(--primary); }
    .badge-region { background:#f0fdf4; color:#15803d; }
    .badge-level { background:#f8fafc; color:#475569; border:1px solid #e2e8f0; }
    .badge-status-现行 { background:#dcfce7; color:#166534; }
    .badge-status-废止 { background:#fee2e2; color:#991b1b; }
    .badge-status-征求意见 { background:#fef9c3; color:#854d0e; }
    .badge-version { background:#fef3c7; color:#92400e; font-size:10px; padding:1px 6px; border-radius:4px; }
    .badge-no-date { background:#f1f5f9; color:#94a3b8; border:1px solid #e2e8f0; font-size:10px; padding:1px 6px; border-radius:4px; }


    .tag-chip { font-size:10px; background:#f1f5f9; color:#475569; padding:2px 8px; border-radius:999px; border:1px solid rgba(148,163,184,.35); }
    .tag-chip.hl { background:#fef9c3; color:#854d0e; }
    .impact-row { display:flex; gap:4px; margin-left:2px; }
    .impact-dot { font-size:10px; padding:1px 6px; border-radius:3px; font-weight:600; letter-spacing:.3px; }

    /* Loading / Empty */
    .loading { text-align:center; padding:60px 0; color:var(--text-muted); }
    .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 10px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty { text-align:center; padding:60px 0; color:var(--text-muted); }
    .empty-icon { font-size:36px; margin-bottom:10px; }
    .pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:20px; }
    .pg-btn { padding:5px 14px; border:1px solid var(--border); background:#fff; border-radius:6px; cursor:pointer; font-size:12px; color:var(--text); }
    .pg-btn:disabled { opacity:.4; cursor:not-allowed; }
    .pg-btn:not(:disabled):hover { border-color:var(--primary); color:var(--primary); }
    .pg-info { font-size:12px; color:var(--text-muted); }

    /* 数据源状态 */
    .source-table { width:100%; border-collapse:collapse; font-size:12px; background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
    .source-table th { background:#f8fafc; padding:10px 12px; text-align:left; font-weight:600; color:#475569; border-bottom:1px solid var(--border); white-space:nowrap; }
    .source-table td { padding:9px 12px; border-bottom:1px solid #f1f5f9; color:#334155; vertical-align:middle; }
    .source-table tr:last-child td { border-bottom:none; }
    .source-table tr:hover td { background:#f8fafc; }
    .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
    .status-dot.ok { background:#22c55e; }
    .status-dot.error { background:#ef4444; }
    .status-dot.never { background:#94a3b8; }
    .log-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
    .log-row { display:flex; gap:12px; padding:6px 0; border-bottom:1px solid #f1f5f9; font-size:12px; }
    .log-row:last-child { border-bottom:none; }
    .log-ts { color:var(--text-xs); white-space:nowrap; width:130px; flex-shrink:0; }
    .log-src { color:var(--text-muted); flex:1; }
    .log-num { color:var(--green); font-weight:600; width:50px; text-align:right; flex-shrink:0; }
    .log-err { color:var(--red); font-size:11px; }

    /* 通知中心 */
    .notif-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .notif-tabs { display:flex; gap:0; }
    .notif-tab { padding:5px 14px; font-size:12px; font-weight:600; border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--text-muted); transition:all .14s; }
    .notif-tab:first-child { border-radius:6px 0 0 6px; }
    .notif-tab:last-child { border-radius:0 6px 6px 0; border-left:none; }
    .notif-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .btn-secondary {
      padding:6px 14px;
      background:rgba(255,255,255,.9);
      border:1px solid var(--border);
      border-radius:12px;
      font-size:12px;
      cursor:pointer;
      color:var(--text-muted);
      transition:transform .12s, box-shadow .12s, border-color .12s, color .12s;
    }
    .btn-secondary:hover { transform:translateY(-1px); box-shadow:0 12px 24px rgba(15,23,42,.08); border-color:rgba(99,102,241,.35); color:var(--text); }
    .notif-list { display:flex; flex-direction:column; gap:6px; }
    .notif-item { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; display:flex; align-items:flex-start; gap:10px; cursor:pointer; transition:background .12s; }
    .notif-item:hover { background:#f8fafc; }
    .notif-item.unread { border-left:3px solid var(--primary); }
    .notif-item.read { border-left:3px solid transparent; opacity:.75; }
    .notif-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; margin-top:5px; }
    .notif-dot.read { background:#cbd5e1; }
    .notif-body { flex:1; min-width:0; }
    .notif-message { font-size:13px; color:var(--text); line-height:1.5; margin-bottom:3px; }
    .notif-meta { font-size:11px; color:var(--text-xs); display:flex; gap:8px; flex-wrap:wrap; }
    .notif-action { flex-shrink:0; }
    .btn-mark-read { font-size:11px; color:var(--primary); background:none; border:none; cursor:pointer; padding:3px 8px; border-radius:4px; }
    .btn-mark-read:hover { background:var(--primary-light); }

    /* 订阅管理 */
    .sub-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); margin-bottom:10px; }
    .sub-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .sub-name { font-size:14px; font-weight:700; color:#0f172a; }
    .sub-freq { font-size:11px; padding:2px 8px; border-radius:4px; background:#f1f5f9; color:#475569; margin-left:8px; }
    .sub-freq.instant { background:#dbeafe; color:#1e40af; }
    .sub-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .sub-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:#f1f5f9; color:#475569; }
    .btn-delete { padding:4px 12px; background:#fef2f2; border:1px solid #fca5a5; color:#991b1b; border-radius:6px; font-size:11px; cursor:pointer; transition:all .14s; }
    .btn-delete:hover { background:#fee2e2; }
    .create-form { background:#fff; border:2px dashed var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
    .create-form.active { border-color:var(--primary); border-style:solid; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    .form-field { display:flex; flex-direction:column; gap:5px; }
    .form-field label { font-size:12px; font-weight:600; color:#475569; }
    .form-field input, .form-field select { font-size:13px; padding:7px 10px; border:1.5px solid var(--border); border-radius:7px; outline:none; transition:border-color .15s; }
    .form-field input:focus, .form-field select:focus { border-color:var(--primary); }
    .form-field textarea { font-size:12px; padding:7px 10px; border:1.5px solid var(--border); border-radius:7px; outline:none; resize:vertical; min-height:60px; font-family:inherit; transition:border-color .15s; }
    .form-field textarea:focus { border-color:var(--primary); }
    .form-hint { font-size:11px; color:var(--text-xs); margin-top:3px; }
    .form-section { margin-bottom:16px; }
    .form-section-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px; }
    .btn-create { padding:9px 20px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:background .14s; }
    .btn-create:hover { background:var(--primary-hover); }
    .btn-create:disabled { opacity:.6; cursor:not-allowed; }
    .btn-cancel { padding:9px 16px; background:#f8fafc; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; font-size:13px; cursor:pointer; transition:all .14s; margin-right:8px; }
    .btn-cancel:hover { background:#e2e8f0; }
    .smtp-hint { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; font-size:12px; color:#166534; margin-bottom:12px; }
    .smtp-warn { background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:10px 14px; font-size:12px; color:#854d0e; margin-bottom:12px; }

    /* Public lock notice */
    .lock-notice { text-align:center; padding:20px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:10px; margin-top:20px; }
    .lock-notice p { font-size:13px; color:#64748b; margin-bottom:10px; }

    /* ── Intel Panel ── */
    .intel-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-bottom:16px; }
    .intel-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .intel-card-header { padding:10px 14px 8px; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:space-between; gap:8px; border-bottom:1px solid var(--border); }
    .intel-card-body { padding:10px 14px; }
    .intel-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid #f1f5f9; cursor:pointer; transition:background .12s; }
    .intel-item:last-child { border-bottom:none; }
    .intel-item:hover { background:#f8fafc; margin:0 -14px; padding:6px 14px; }
    .intel-item-title { font-size:12px; color:#0f172a; line-height:1.45; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .intel-item-meta { font-size:10px; color:#94a3b8; white-space:nowrap; flex-shrink:0; }
    .coverage-bar-bg { background:#e2e8f0; border-radius:6px; height:10px; overflow:hidden; margin:8px 0 4px; }
    .coverage-bar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#10b981,#2563eb); transition:width .5s; }
    .coverage-pct { font-size:22px; font-weight:800; color:#0f172a; }
    .week-buckets { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px; }
    .week-bucket { background:#f8fafc; border:1px solid var(--border); border-radius:6px; padding:8px 6px; text-align:center; }
    .week-bucket-v { font-size:20px; font-weight:800; color:#0f172a; }
    .week-bucket-l { font-size:10px; color:#64748b; margin-top:2px; }
    .kw-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
    .kw-tag { font-size:10px; padding:1px 7px; border-radius:4px; font-weight:600; }
    .kw-opp { background:#d1fae5; color:#065f46; }
    .kw-risk { background:#fee2e2; color:#991b1b; }
    .intel-empty { font-size:12px; color:#94a3b8; padding:10px 0; text-align:center; }

    /* ── 全文搜索视图 ── */
    .fts-wrap { padding:0; }
    .fts-hero { background:linear-gradient(135deg,#0f172a,#1e3a8a); color:#fff; padding:24px 20px 20px; border-radius:var(--radius); margin-bottom:16px; }
    .fts-hero-title { font-size:18px; font-weight:800; margin-bottom:4px; }
    .fts-hero-sub { font-size:12px; opacity:.75; margin-bottom:14px; }
    .fts-search-row { display:flex; gap:8px; }
    .fts-input { flex:1; padding:10px 14px; border-radius:8px; border:none; font-size:14px; color:#0f172a; outline:none; }
    .fts-btn { padding:10px 20px; background:#2563eb; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap; transition:background .15s; }
    .fts-btn:hover { background:#1d4ed8; }
    .fts-btn:disabled { opacity:.6; cursor:not-allowed; }
    .fts-result-item { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); cursor:pointer; transition:box-shadow .14s,border-left-color .14s; border-left:3px solid transparent; margin-bottom:10px; }
    .fts-result-item:hover { box-shadow:var(--shadow-hover); border-left-color:var(--primary); }
    .fts-result-title { font-size:14px; font-weight:600; color:#0f172a; margin-bottom:6px; line-height:1.5; }
    .fts-result-snippet { font-size:12px; color:#475569; line-height:1.7; margin-bottom:8px; background:#f8fafc; border-radius:6px; padding:8px 10px; border-left:3px solid #cbd5e1; }
    .fts-result-meta { display:flex; flex-wrap:wrap; gap:6px; font-size:11px; }
    .fts-hint { font-size:12px; color:#94a3b8; margin-top:6px; }

    /* ── Diff 面板 ── */
    .diff-wrap { margin-top:14px; }
    .diff-toggle { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#f8fafc; border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; color:#475569; transition:all .14s; }
    .diff-toggle:hover { background:#e2e8f0; }
    .diff-body { margin-top:10px; background:#0f172a; border-radius:8px; overflow:auto; max-height:360px; padding:12px 14px; font-family:monospace; font-size:12px; line-height:1.6; }
    .diff-line-add    { color:#4ade80; white-space:pre; }
    .diff-line-del    { color:#f87171; white-space:pre; }
    .diff-line-info   { color:#60a5fa; white-space:pre; }
    .diff-line-hunk   { color:#94a3b8; white-space:pre; }
    .diff-line-normal { color:#94a3b8; white-space:pre; }
    .diff-no-snap { background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:10px 14px; font-size:12px; color:#92400e; margin-top:10px; }

    /* ── 导出清单按钮 ── */
    .btn-checklist { padding:5px 14px; background:#fff; border:1.5px solid #86efac; color:#16a34a; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all .14s; }
    .btn-checklist:hover { background:#f0fdf4; }

    /* ── AI 解读卡 ── */
    .analysis-card { margin-top:18px; border:1.5px solid #c7d2fe; border-radius:12px; overflow:hidden; background:#fff; }
    .analysis-card-header { background:linear-gradient(135deg,#4f46e5,#2563eb); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .analysis-card-title { font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
    .analysis-card-meta { font-size:10px; opacity:.85; }
    .analysis-card-body { padding:14px 16px; }
    .analysis-one-liner { font-size:14px; font-weight:700; color:#1e293b; margin-bottom:10px; line-height:1.5; }
    .stance-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; margin-bottom:12px; }
    .stance-positive { background:#dcfce7; color:#166534; }
    .stance-negative { background:#fee2e2; color:#991b1b; }
    .stance-neutral  { background:#f1f5f9; color:#475569; }
    .stance-mixed    { background:#fef3c7; color:#92400e; }
    .confidence-bar-wrap { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .confidence-bar-bg { flex:1; height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
    .confidence-bar-fill { height:100%; background:linear-gradient(90deg,#4f46e5,#2563eb); border-radius:3px; transition:width .5s; }
    .confidence-label { font-size:11px; color:#64748b; white-space:nowrap; }
    .analysis-section { margin-bottom:12px; }
    .analysis-section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:#64748b; margin-bottom:6px; display:flex; align-items:center; gap:5px; }
    .analysis-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px; }
    .analysis-list li { font-size:12px; color:#334155; padding:5px 10px; background:#f8fafc; border-radius:6px; border-left:3px solid #c7d2fe; line-height:1.55; }
    .analysis-list li strong { color:#1e293b; }
    .action-item { background:#f0fdf4; border-left-color:#86efac; }
    .action-item .action-role { display:inline-block; background:#dcfce7; color:#166534; border-radius:4px; padding:0 6px; font-size:10px; font-weight:700; margin-right:5px; }
    .action-item .action-deadline { font-size:10px; color:#64748b; margin-left:4px; }
    .action-item .action-effort { font-size:10px; color:#94a3b8; margin-left:4px; font-style:italic; }
    .evidence-item { background:#fefce8; border-left-color:#fde047; font-style:italic; }
    .evidence-item .ev-reason { font-style:normal; color:#78350f; font-size:11px; margin-top:3px; }
    .segment-chips { display:flex; flex-wrap:wrap; gap:5px; }
    .segment-chip { background:#e0e7ff; color:#3730a3; border-radius:12px; padding:2px 10px; font-size:11px; font-weight:500; }
    .kp-item { background:#f0f9ff; border-left:3px solid #7dd3fc; }
    .kp-item .kp-why { font-size:11px; color:#0369a1; margin-top:2px; }
    .opp-item { background:#f0fdf4; border-left:3px solid #86efac; }
    .risk-item { background:#fef2f2; border-left:3px solid #fca5a5; }
    .analysis-actions-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:12px; border-top:1px solid #e2e8f0; }
    .btn-regen { padding:5px 14px; background:#4f46e5; color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:background .14s; }
    /* ── 收藏 & 对比 ── */
    .btn-bookmark { padding:5px 12px; background:#fff; border:1.5px solid #e2e8f0; border-radius:7px; font-size:13px; cursor:pointer; transition:all .14s; color:#64748b; }
    .btn-bookmark.active { border-color:#f59e0b; background:#fffbeb; color:#d97706; }
    .btn-bookmark:hover { border-color:#fbbf24; }
    .btn-compare-add { padding:5px 12px; background:#fff; border:1.5px solid #e2e8f0; border-radius:7px; font-size:13px; cursor:pointer; transition:all .14s; color:#64748b; }
    .btn-compare-add.selected { border-color:#4f46e5; background:#eef2ff; color:#4f46e5; }
    .btn-compare-add:hover { border-color:#a5b4fc; }
    .compare-bar { position:fixed; bottom:0; left:0; right:0; background:#1e293b; color:#fff; padding:12px 24px; display:flex; align-items:center; gap:12px; z-index:1000; box-shadow:0 -4px 20px rgba(0,0,0,.25); }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = "";

const CATEGORY_TYPES = [
  "政策/规划/指导意见","通知/办法/细则/实施方案","市场规则","标准规范",
  "并网与调度","安全消防","验收/检测/认证","补贴资金/奖补",
  "示范项目/试点清单","招标公告","中标结果/候选人公示","事故通报/风险预警/执法处罚",
];
const CAT_COLORS = ["#3b82f6","#6366f1","#0ea5e9","#0d9488","#10b981","#ef4444","#f97316","#16a34a","#8b5cf6","#dc2626","#b45309","#be123c"];
const CAT_BG    = ["#eff6ff","#eef2ff","#f0f9ff","#f0fdfa","#f0fdf4","#fef2f2","#fff7ed","#f0fdf4","#faf5ff","#fef2f2","#fffbeb","#fff1f2"];
const TIME_OPTIONS   = [{label:"7天",days:7},{label:"30天",days:30},{label:"90天",days:90},{label:"180天",days:180},{label:"1年",days:365}];
const STATUS_OPTIONS = ["现行","征求意见","废止"];
const LEVEL_OPTIONS  = ["国家","省","市","行业"];
const IMPACT_OPTIONS = ["电站开发商","储能系统集成商","设备制造商","电网公司","检测认证机构","运维单位","消防部门"];
const IMPACT_STYLE   = {
  "电站开发商":    {bg:"#dbeafe",c:"#1e40af"},
  "储能系统集成商":{bg:"#e0e7ff",c:"#3730a3"},
  "设备制造商":    {bg:"#f3e8ff",c:"#6b21a8"},
  "电网公司":      {bg:"#d1fae5",c:"#065f46"},
  "检测认证机构":  {bg:"#fef3c7",c:"#92400e"},
  "运维单位":      {bg:"#fee2e2",c:"#991b1b"},
  "消防部门":      {bg:"#fce7f3",c:"#9d174d"},
};
const TAGS_PRESET = ["储能主题","新能源","电力市场","并网","锂电","虚拟电厂","调峰调频","补贴","招标","标准"];
const BUCKET_OPTS = [{v:"policy",l:"政策/规划"},{v:"subsidy",l:"补贴/奖补"},{v:"tender",l:"招标/采购"},{v:"compliance",l:"合规/标准"}];
const REGION_LIST = ["全国","北京","天津","河北","山西","内蒙古","辽宁","吉林","黑龙江","上海","江苏","浙江","安徽","福建","江西","山东","河南","湖北","湖南","广东","广西","海南","重庆","四川","贵州","云南","西藏","陕西","甘肃","青海","宁夏","新疆"];

function heatColor(val,max) {
  if(!val||val===0) return {bg:"#f8fafc",color:"#94a3b8"};
  const r = Math.min(val/Math.max(max,1),1);
  if(r<0.2)  return {bg:"#dbeafe",color:"#1e40af"};
  if(r<0.45) return {bg:"#93c5fd",color:"#1e3a8a"};
  if(r<0.7)  return {bg:"#3b82f6",color:"#fff"};
  return {bg:"#1d4ed8",color:"#fff"};
}

function fmtDate(d) { return d?d.slice(0,10):"-"; }
function fmtTs(ts) {
  if(!ts) return "-";
  const d = new Date(ts.replace(" ","T"));
  if(isNaN(d)) return ts.slice(0,16);
  const now = new Date();
  const diff = Math.floor((now-d)/60000);
  if(diff<1)  return "刚刚";
  if(diff<60) return `${diff}分钟前`;
  if(diff<1440) return `${Math.floor(diff/60)}小时前`;
  return ts.slice(0,16);
}
function toggle(arr,v) { return arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]; }

// ── AuthModal ─────────────────────────────────────────────
function AuthModal({onLogin, onClose}) {
  const [tab,setTab]     = useState("login");
  const [user,setUser]   = useState("");
  const [pass,setPass]   = useState("");
  const [conf,setConf]   = useState("");
  const [err,setErr]     = useState("");
  const [busy,setBusy]   = useState(false);
  async function submit(e) {
    e.preventDefault(); setErr("");
    if(tab==="register") {
      if(pass!==conf) { setErr("两次密码不一致"); return; }
      if(pass.length<6) { setErr("密码至少6位"); return; }
    }
    setBusy(true);
    try {
      const url = tab==="login"?"/api/auth/login":"/api/auth/register";
      const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",body:JSON.stringify({username:user.trim(),password:pass})});
      const d = await r.json();
      if(!r.ok) { setErr(d.detail||"操作失败"); return; }
      onLogin(d.username);
    } catch(ex) { setErr("网络错误："+ex.message); } finally { setBusy(false); }
  }
  return (
    <div className="modal-overlay" onClick={onClose||undefined}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-logo">⚡</div>
        <div className="modal-title">储能政策情报看板</div>
        <div className="modal-sub">登录以解锁全量数据 · 筛选 · 订阅 · 导出</div>
        <div className="auth-tabs">
          <div className={`auth-tab ${tab==="login"?"active":""}`} onClick={()=>{setTab("login");setErr("");}}>登录</div>
          <div className={`auth-tab ${tab==="register"?"active":""}`} onClick={()=>{setTab("register");setErr("");}}>注册</div>
        </div>
        <form onSubmit={submit}>
          {err && <div className="auth-error">⚠️ {err}</div>}
          <div className="form-group"><label className="form-label">用户名</label><input className="form-input" type="text" autoFocus value={user} onChange={e=>setUser(e.target.value)} required minLength={2} placeholder="输入用户名"/></div>
          <div className="form-group"><label className="form-label">密码</label><input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} required placeholder={tab==="register"?"至少6位":"输入密码"}/></div>
          {tab==="register" && <div className="form-group"><label className="form-label">确认密码</label><input className="form-input" type="password" value={conf} onChange={e=>setConf(e.target.value)} required placeholder="再次输入密码"/></div>}
          <button className="btn-primary" type="submit" disabled={busy}>{busy?"处理中…":tab==="login"?"登录":"注册并登录"}</button>
        </form>
        <div className="auth-hint">{tab==="login"?<>没有账号？<span style={{color:"#2563eb",cursor:"pointer"}} onClick={()=>{setTab("register");setErr("");}}>立即注册</span></>:<>已有账号？<span style={{color:"#2563eb",cursor:"pointer"}} onClick={()=>{setTab("login");setErr("");}}>去登录</span></>}</div>
        {onClose && <div style={{textAlign:"center",marginTop:12}}><button className="btn-cancel" onClick={onClose} style={{width:"100%"}}>暂不登录，继续浏览</button></div>}
      </div>
    </div>
  );
}

// ── TrendChart（纯 SVG，无第三方依赖）──────────────────────
function TrendChart() {
  const [monthsN,setMonthsN] = useState(12);
  const [data,setData]       = useState(null);
  const [loading,setLoading] = useState(true);
  const [err,setErr]         = useState("");

  const wrapRef = useRef(null);
  const [hover,setHover]     = useState(null); // {x,y,mm,tag,v}

  const TAGS = [
    {k:"储能主题", c:"#3b82f6"},
    {k:"新能源",   c:"#22c55e"},
    {k:"电力市场", c:"#f97316"},
    {k:"补贴",     c:"#eab308"},
    {k:"招标",     c:"#a855f7"},
  ];

  useEffect(()=>{
    let alive = true;
    setLoading(true); setErr("");
    fetch(`/api/stats/trend?months=${monthsN}`,{credentials:"include"})
      .then(r=>r.ok?r.json():r.json().then(d=>Promise.reject(new Error(d.detail||"加载失败"))))
      .then(d=>{ if(alive) setData(d); })
      .catch(e=>{ if(alive){ setErr(e.message||"加载失败"); setData(null);} })
      .finally(()=>{ if(alive) setLoading(false); });
    return ()=>{ alive=false; };
  },[monthsN]);

  const months = data?.months || [];
  const series = data?.series || {};

  const rawMaxV = Math.max(
    1,
    ...TAGS.flatMap(t => (series[t.k] || []).map(x => Number(x||0)))
  );

  function niceStep(x){
    const v = Math.max(1e-9, Number(x||0));
    const p = Math.pow(10, Math.floor(Math.log10(v)));
    const r = v / p;
    if(r <= 1) return 1*p;
    if(r <= 2) return 2*p;
    if(r <= 5) return 5*p;
    return 10*p;
  }

  const tickCount = 4;
  const stepV = niceStep(rawMaxV / tickCount);
  const maxV  = Math.ceil(rawMaxV / stepV) * stepV;
  const ticks = Array.from({length: tickCount+1}, (_,i)=> maxV - i*stepV);

  const n = months.length || 1;
  const s = TAGS.length;
  const M = {l:44, r:14, t:18, b:48};
  // Dynamic width: at least 52px per group so bars are always readable
  const minGroupPx = 80;
  const W = Math.max(700, n * minGroupPx + M.l + M.r);
  const H = 380;
  const innerW = W - M.l - M.r;
  const innerH = H - M.t - M.b;

  const step = innerW / n;
  const groupW = step * 0.92;
  const barW = groupW / s;

  const isMobile = typeof window !== 'undefined' && window.innerWidth <= 640;
  const showEvery = months.length > 12 ? 2 : (isMobile && months.length > 6 ? 2 : 1);

  function yOf(v){
    const vv = Math.max(0, Number(v||0));
    return M.t + innerH - (vv / Math.max(maxV, 1)) * innerH;
  }

  function handleMove(e, mm, tag, v){
    const rect = wrapRef.current?.getBoundingClientRect();
    if(!rect) return;
    setHover({
      x: e.clientX - rect.left,
      y: e.clientY - rect.top,
      mm, tag, v,
    });
  }

  return (
    <div className="chart-wrap">
      <div className="chart-title-row">
        <span style={{fontSize:13,fontWeight:800,color:"#0f172a"}}>📈 月度趋势（按主题）</span>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {TAGS.map(t=>(
              <span key={t.k} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,color:"#64748b"}}>
                <span style={{width:10,height:10,borderRadius:2,background:t.c,display:"inline-block"}}/>
                {t.k}
              </span>
            ))}
          </div>
          <div className="chart-seg">
            {[6,12,24].map(m=>(
              <button key={m} className={`chart-seg-btn ${monthsN===m?"active":""}`} onClick={()=>setMonthsN(m)}>
                近{m}个月
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="chart-subtitle">近{monthsN}个月储能相关政策发布趋势（按主题分类）</div>

      {err && <div className="auth-error" style={{marginBottom:10}}>⚠️ {err}</div>}

      {loading ? (
        <div className="loading" style={{padding:"8px 0"}}><div className="spinner"/>加载趋势…</div>
      ) : (!months || months.length===0) ? (
        <div style={{color:"#94a3b8",fontSize:12}}>暂无趋势数据</div>
      ) : (
        <div className="chart-container" style={{height:"auto",minHeight:180,overflowX:"auto",overflowY:"hidden"}} ref={wrapRef} onMouseLeave={()=>setHover(null)}>
          {hover && (
            <div className="chart-tooltip" style={{left:hover.x, top:hover.y}}>
              {hover.mm} · {hover.tag}: {hover.v}
            </div>
          )}
          <svg
            viewBox={`0 0 ${W} ${H}`}
            width={W}
            height={H}
            role="img"
            aria-label="月度趋势柱状图"
            style={{display:"block"}}
          >
            {/* grid + y labels */}
            {ticks.map((v,i)=>{
              const y = yOf(v);
              return (
                <g key={i}>
                  <line x1={M.l} x2={W-M.r} y1={y} y2={y} stroke="#e2e8f0" strokeWidth="1"/>
                  <text x={M.l-10} y={y+4} textAnchor="end" fontSize="10" fill="#94a3b8">{v}</text>
                </g>
              );
            })}

            {/* bars */}
            {months.map((mm, i)=>{
              const gx = M.l + i*step + (step - groupW)/2;
              return (
                <g key={mm}>
                  {TAGS.map((t, j)=>{
                    const v = Number(((series[t.k] || [])[i] || 0));
                    const y = yOf(v);
                    const h = M.t + innerH - y;
                    const x = gx + j*barW;
                    return (
                      <rect
                        key={t.k}
                        x={x}
                        y={y}
                        width={Math.max(1, barW-1)}
                        height={h}
                        fill={t.c}
                        opacity={(hover && hover.mm===mm && hover.tag===t.k) ? 1 : 0.9}
                        rx={4}
                        style={{cursor:"pointer"}}
                        onMouseMove={(e)=>handleMove(e, mm, t.k, v)}
                        onMouseEnter={(e)=>handleMove(e, mm, t.k, v)}
                        onMouseLeave={()=>setHover(null)}
                      />
                    );
                  })}

                  {/* x label */}
                  {(i % showEvery === 0) && (
                    <text
                      x={M.l + i*step + step/2}
                      y={H-14}
                      textAnchor="middle"
                      fontSize="10"
                      fill="#64748b"
                    >
                      {mm.slice(0,7)}
                    </text>
                  )}
                </g>
              );
            })}

            {/* axis */}
            <line x1={M.l} x2={M.l} y1={M.t} y2={M.t+innerH} stroke="#cbd5e1" strokeWidth="1"/>

  );
}

function _fmtPct(n){ return (Math.round(n*10)/10).toFixed(1); }
function _arcPath(cx, cy, r0, r1, a0, a1) {
  // a0/a1 in degrees, 0deg at 12 o'clock
  const toRad = d => (d - 90) * Math.PI / 180;
  const p = (r, a) => ({x: cx + r*Math.cos(toRad(a)), y: cy + r*Math.sin(toRad(a))});
  const o0 = p(r1, a0), o1 = p(r1, a1);
  const i1 = p(r0, a1), i0 = p(r0, a0);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return [
    `M ${o0.x} ${o0.y}`,
    `A ${r1} ${r1} 0 ${large} 1 ${o1.x} ${o1.y}`,
    `L ${i1.x} ${i1.y}`,
    `A ${r0} ${r0} 0 ${large} 0 ${i0.x} ${i0.y}`,
    "Z",
  ].join(" ");
}

// ── 中国省份地理热力图（真实 SVG 省界地图）────────────────────
function ChinaHeatMap({counts}) {
  const [geo, setGeo]         = useState(null);
  const [loadErr, setLoadErr] = useState(false);
  const [tip, setTip]         = useState(null);

  useEffect(() => {
    fetch("https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json")
      .then(r => { if(!r.ok) throw new Error("err"); return r.json(); })
      .then(d => setGeo(d))
      .catch(() => setLoadErr(true));
  }, []);

  const VW = 600, VH = 500;
  const minLon = 73, maxLon = 136, minLat = 15, maxLat = 54;

  function proj([lon, lat]) {
    const x = (lon - minLon) / (maxLon - minLon) * VW;
    const y = (1 - (lat - minLat) / (maxLat - minLat)) * VH;
    return [x, y];
  }

  function toPath(geometry) {
    let rings = [];
    if (geometry.type === 'Polygon') rings = geometry.coordinates;
    else if (geometry.type === 'MultiPolygon') rings = geometry.coordinates.flat(1);
    return rings.map(ring =>
      ring.map((pt, i) => {
        const [x, y] = proj(pt);
        return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
      }).join('') + 'Z'
    ).join(' ');
  }

  function featureCentroid(f) {
    const c = f.properties?.centroid || f.properties?.center;
    if (c) return proj(c);
    const g = f.geometry;
    const ring = g.type === 'Polygon' ? g.coordinates[0]
      : g.coordinates.reduce((a, b) => a[0].length >= b[0].length ? a : b)[0];
    let lx = 0, ly = 0;
    ring.forEach(([lo, la]) => { lx += lo; ly += la; });
    return proj([lx / ring.length, ly / ring.length]);
  }

  function shortName(n) {
    const m = {
      "内蒙古自治区":"内蒙古","新疆维吾尔自治区":"新疆","西藏自治区":"西藏",
      "广西壮族自治区":"广西","宁夏回族自治区":"宁夏",
      "香港特别行政区":"香港","澳门特别行政区":"澳门",
    };
    return m[n] || n.replace(/[省市]$/, '');
  }

  const national = Number((counts||{})["全国"] || 0);
  const maxV = Math.max(1, ...Object.values(counts||{}).map(Number).filter(v => isFinite(v) && v > 0));

  function heatColor(v) {
    if (!v) return {fill:"#f0f9ff", stroke:"#bae6fd", txt:"#94a3b8"};
    const t = v / maxV;
    const r = Math.round(239 - t*209), g = Math.round(246 - t*188), b = 255;
    const alpha = 0.4 + t * 0.6;
    return {
      fill: `rgba(${r},${g},${b},${alpha})`,
      stroke: `rgba(37,99,235,${0.3+t*0.7})`,
      txt: t > 0.55 ? "#fff" : "#1e40af",
    };
  }

  // 气泡图兜底数据
  const PROVS_FB = [
    {n:"黑龙江",cx:504,cy:67,a:36},{n:"吉林",cx:494,cy:121,a:24},{n:"辽宁",cx:458,cy:161,a:24},
    {n:"内蒙古",cx:411,cy:108,a:32},{n:"新疆",cx:131,cy:148,a:40},{n:"西藏",cx:140,cy:295,a:34},
    {n:"青海",cx:215,cy:242,a:28},{n:"甘肃",cx:289,cy:188,a:28},{n:"宁夏",cx:308,cy:215,a:14},
    {n:"陕西",cx:336,cy:242,a:24},{n:"山西",cx:364,cy:215,a:22},{n:"北京",cx:402,cy:175,a:13},
    {n:"天津",cx:416,cy:188,a:11},{n:"河北",cx:392,cy:195,a:24},{n:"山东",cx:427,cy:228,a:24},
    {n:"河南",cx:383,cy:255,a:24},{n:"安徽",cx:415,cy:282,a:22},{n:"江苏",cx:436,cy:268,a:22},
    {n:"上海",cx:453,cy:295,a:11},{n:"浙江",cx:441,cy:322,a:22},{n:"四川",cx:280,cy:309,a:30},
    {n:"重庆",cx:327,cy:309,a:16},{n:"湖北",cx:364,cy:295,a:24},{n:"湖南",cx:364,cy:335,a:24},
    {n:"江西",cx:396,cy:335,a:22},{n:"贵州",cx:317,cy:349,a:22},{n:"福建",cx:425,cy:362,a:20},
    {n:"云南",cx:271,cy:376,a:28},{n:"广西",cx:333,cy:389,a:24},{n:"广东",cx:383,cy:403,a:28},
    {n:"海南",cx:355,cy:445,a:16},
  ];

  return (
    <div style={{position:"relative"}}>
      {/* 国家级单独展示 */}

        <span style={{fontSize:18,fontWeight:900,color:"#1e40af"}}>{national}</span>
        <span style={{fontSize:11,color:"#60a5fa"}}>条</span>
      </div>

      {!geo && !loadErr && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:220,color:"#94a3b8",fontSize:12}}>
          <div className="spinner" style={{marginRight:8}}/>加载地图中…

      {geo && (

          <rect x="0" y="0" width={VW} height={VH} fill="#dbeafe" rx="4"/>

    {k:"现行", v:s0, r:68, c:"#22c55e"},
    {k:"征求意见", v:s1, r:52, c:"#f59e0b"},
    {k:"废止", v:s2, r:36, c:"#ef4444"},
  ];

  function semiPath(r){
    const x0=cx-r, x1=cx+r;
    return `M ${x0} ${cy} A ${r} ${r} 0 0 0 ${x1} ${cy}`;
  }

  return (
    <div style={{position:"relative"}}>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`}>
        {rings.map(r=>{
          const len = Math.PI*r.r;
          const p = (r.v/total);
          return (
            <g key={r.k}>
              <path d={semiPath(r.r)} fill="none" stroke="rgba(148,163,184,.25)" strokeWidth="10" strokeLinecap="round" />
              <path
                d={semiPath(r.r)}
                fill="none"
                stroke={r.c}
                strokeWidth="10"
                strokeLinecap="round"
                strokeDasharray={`${len*p} ${len}`}
                onMouseMove={e=>{
                  const rect=e.currentTarget.ownerSVGElement.getBoundingClientRect();
                  const pct=r.v/total*100;
                  setTip({x:e.clientX-rect.left,y:e.clientY-rect.top,text:`${r.k}：${r.v} 条（${_fmtPct(pct)}%）`});
                }}
                onMouseLeave={()=>setTip(null)}
              />
            </g>
          );
        })}
        <text x={cx} y={cy-14} textAnchor="middle" style={{fontSize:24,fontWeight:900,fill:"#0f172a"}}>{total}</text>
        <text x={cx} y={cy+6} textAnchor="middle" style={{fontSize:11,fontWeight:650,fill:"#94a3b8"}}>文件状态总数</text>
        {/* Legend inside SVG to avoid overflow:hidden clipping */}
        <g transform={`translate(${cx-100},${cy+22})`}>
          {[{k:"现行",c:"#22c55e"},{k:"征求意见",c:"#f59e0b"},{k:"废止",c:"#ef4444"}].map((it,i)=>(
            <g key={it.k} transform={`translate(${i*70},0)`}>
              <circle cx="5" cy="5" r="5" fill={it.c}/>
              <text x="14" y="9" style={{fontSize:11,fill:"#475569",fontWeight:600}}>{it.k}</text>
            </g>
          ))}
        </g>
      </svg>
      {tip && <div className="viz-tooltip" style={{left:tip.x, top:tip.y}}>{tip.text}</div>}
    </div>
  );
}

      fetch("/api/filters/meta?days=365",{credentials:"include"}).then(r=>r.json()).catch(()=>null),

  const maxT = Math.max(1,...matrix.map(r=>r.tender));

  const recent7d    = stats?.recent_7d??"-";

    return <span className="heat-cell" style={{background:bg,color}}>{val}</span>;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div>
        <div className="dash-section-title">📊 总览 <span className="updated">更新于 {updated_at}</span></div>

          {[

            {k:"覆盖来源", v:srcCount,  sub:"个数据源",    ico:"📡", accent:"#0ea5e9"},

function Chip({label,active,disabled,onClick}) {
  return (
    <button
      className={`chip ${active?"active":""}`}
      disabled={!!disabled}
      onClick={disabled?undefined:onClick}
      title={disabled?"暂无该选项数据":undefined}
    >
      {label}

function CatChip({label,count,active,disabled,onClick}) {
  const idx=CATEGORY_TYPES.indexOf(label);
  const color=CAT_COLORS[idx]||"#64748b"; const bg=CAT_BG[idx]||"#f1f5f9";
  let style;
  if(disabled) style={background:"#fff",borderColor:"#e2e8f0",color:"#94a3b8",opacity:.55,cursor:"not-allowed"};
  else if(active) style={background:color,borderColor:color,color:"#fff"};
  else style={background:bg,borderColor:color+"44",color};
  return <button className="cat-chip" style={style} onClick={disabled?undefined:onClick} title={disabled?"暂无该类别数据":undefined}>{label}{Number.isFinite(count)?` (${count})`:""}</button>;
}

function AnalysisCard({data, onRegen, loading, onExportChecklist}) {

    negative: {label:"🔴 利空", cls:"stance-negative"},

    mixed:    {label:"🟡 混合", cls:"stance-mixed"},

    const md = data.analysis_md || "";

    const blob = new Blob([md], {type:"text/markdown;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a2 = document.createElement("a");
    a2.href = url; a2.download = `policy_analysis_${data.item_id||"item"}.md`;
    a2.click(); URL.revokeObjectURL(url);
  }

  return (
    <div className="analysis-card">
      <div className="analysis-card-header">

        {a.one_liner && <div className="analysis-one-liner">「{a.one_liner}」</div>}

        <div className={`stance-badge ${stance.cls}`}>{stance.label}</div>

        {/* 置信度 */}
        <div className="confidence-bar-wrap">
          <div className="confidence-bar-bg">
            <div className="confidence-bar-fill" style={{width:`${confPct}%`}}/>
          </div>
          <div className="confidence-label">置信度 {confPct}%</div>
        </div>

        {/* 受影响群体 */}
        {(a.affected_segments||[]).length>0 && (
          <div className="analysis-section">
            <div className="analysis-section-title">👥 影响对象</div>

          {(a.opportunities||[]).length>0 && (
            <div className="analysis-section" style={{marginBottom:0}}>
              <div className="analysis-section-title">✅ 机会</div>

                {a.opportunities.map((o,i)=><li key={i} className="opp-item">{o}</li>)}

                <li key={i} className="action-item">

              {a.evidence.map((ev,i)=>(
