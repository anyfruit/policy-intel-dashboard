function ItemModal({item,onClose,isLoggedIn,onAddToCompare,isInCompare}) {
  const [versions,setVersions]         = useState(null);
  const [loadVer,setLoadVer]           = useState(false);

  // Diff
  const [showDiff,setShowDiff]         = useState(false);
  const [diffData,setDiffData]         = useState(null);   // null=未加载
  const [loadDiff,setLoadDiff]         = useState(false);

  // ── 解读状态 ──
  const [analysis,setAnalysis]         = useState(null);   // 已有解读数据
  const [analysisLoading,setALoading]  = useState(false);
  const [analysisError,setAError]      = useState(null);
  const [noKeyMsg,setNoKeyMsg]         = useState(null);

  useEffect(()=>{
    if(!item) return;
    setVersions(null);
    setAnalysis(null); setAError(null); setNoKeyMsg(null);
    setShowDiff(false); setDiffData(null);

    if(isLoggedIn && (item.version_count||0) > 0) {
      setLoadVer(true);
      fetch(`/api/items/${item.id}/versions`,{credentials:"include"})
        .then(r=>r.json()).then(d=>setVersions(d.versions||[])).catch(()=>{})
        .finally(()=>setLoadVer(false));
    }

    // 自动加载缓存（GET，不触发 LLM）
    if(isLoggedIn) {
      fetch(`/api/items/${item.id}/analysis`,{credentials:"include"})
        .then(r=>r.json())
        .then(d=>{ if(d.has) setAnalysis(d); })
        .catch(()=>{});
    }
  },[item,isLoggedIn]);

  function toggleDiff() {
    if(!showDiff && diffData===null) {
      setLoadDiff(true);
      fetch(`/api/items/${item.id}/diff`,{credentials:"include"})
        .then(r=>r.json())
        .then(d=>setDiffData(d))
        .catch(e=>setDiffData({has:false,reason:"加载失败: "+e.message}))
        .finally(()=>setLoadDiff(false));
    }
    setShowDiff(v=>!v);
  }

  function exportChecklist(format) {
    window.open(`/api/items/${item.id}/checklist?format=${format}`, "_blank");
  }

  // ── 用户画像 state ──
  const [bookmarked, setBookmarked] = useState(false);
  useEffect(()=>{
    if(!isLoggedIn||!item) return;
    fetch(`/api/bookmarks/${item.id}/status`,{credentials:"include"})
      .then(r=>r.json()).then(d=>setBookmarked(d.bookmarked||false)).catch(()=>{});
  },[item?.id]);
  function toggleBookmark() {
    const method = bookmarked ? "DELETE" : "POST";
    fetch(`/api/bookmarks/${item.id}`,{method,credentials:"include"})
      .then(r=>r.json()).then(d=>setBookmarked(d.bookmarked));
  }

  const [showProfileModal, setShowProfileModal] = useState(false);
  const [pendingMode, setPendingMode]           = useState(null);
  const [pendingForce, setPendingForce]         = useState(false);
  const [pRole, setPRole]     = useState("");
  const [pFocus, setPFocus]   = useState([]);  // 多选
  const [pSize, setPSize]     = useState("");

  function openProfileModal(mode, force=false) {
    setPendingMode(mode); setPendingForce(force);
    setShowProfileModal(true);
  }
  function handleProfileStart(skip=false) {
    setShowProfileModal(false);
    const ctx = skip ? "" : buildUserContext();
    triggerAnalysis(pendingMode, pendingForce, ctx);
  }
  function buildUserContext() {
    const parts = [];
    if(pRole)       parts.push(`角色：${pRole}`);
    if(pFocus.length) parts.push(`关注重点：${pFocus.join("、")}`);
    if(pSize)       parts.push(`公司规模：${pSize}`);
    return parts.length ? `用户背景--${parts.join("，")}。请根据此背景，重点解读对该用户最相关的内容，并突出实操建议。` : "";
  }
  function toggleFocus(v){
    setPFocus(prev => prev.includes(v) ? prev.filter(x=>x!==v) : prev.length<2 ? [...prev,v] : prev);
  }

  async function triggerAnalysis(mode, force=false, userCtx="") {
    setALoading(true); setAError(null); setNoKeyMsg(null);
    try {
      const url = `/api/items/${item.id}/analysis?mode=${mode}&force=${force}`;
      const resp = await fetch(url, {
        method:"POST", credentials:"include",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({user_context: userCtx||""}),
      });
      const data = await resp.json();
      if(!resp.ok) {
        const detail = data.detail || "请求失败";
        if(resp.status===400 && detail.includes("OPENAI_API_KEY")) {
          setNoKeyMsg(detail);
        } else {
          setAError(detail);
        }
        return;
      }
      setAnalysis(data);
    } catch(e) {
      setAError("网络错误：" + e.message);
    } finally {
      setALoading(false);
    }
  }

  if(!item) return null;
  const verCnt = item.version_count||0;
  const noDate = !item.date;

  const ROLES  = ["🏗️ 项目开发商","🔧 系统集成商","📊 咨询/投研机构","🏭 设备/电池制造商","🏛️ 政府/园区/监管"];
  const FOCUS  = ["💰 补贴申报","⚡ 并网合规","📋 安全合规/消防","📈 电力市场交易","🔍 政策研究/调研"];
  const SIZES  = ["小型（<50人）","中型（50-500人）","大型（>500人）"];
  const canStart = !!pRole || pFocus.length>0 || !!pSize;

  return (<>
    {showProfileModal && (
      <div className="profile-modal-overlay" onClick={()=>setShowProfileModal(false)}>
        <div className="profile-modal-box" onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:15,fontWeight:800,color:"#0f172a",marginBottom:16}}>
            🎯 为你定制解读 · 3个问题
          </div>

          <p className="profile-q-title">① 您的角色</p>
          <div className="profile-chips">
            {ROLES.map(r=>(
              <span key={r} className={`profile-chip${pRole===r?" active":""}`} onClick={()=>setPRole(r===pRole?"":r)}>{r}</span>
            ))}
          </div>

          <p className="profile-q-title">② 主要关注点 <span style={{fontWeight:400,color:"#94a3b8",fontSize:11}}>(至多2项)</span></p>
          <div className="profile-chips">
            {FOCUS.map(f=>(
              <span key={f} className={`profile-chip${pFocus.includes(f)?" active":""}`} onClick={()=>toggleFocus(f)}>{f}</span>
            ))}
          </div>

          <p className="profile-q-title">③ 公司规模</p>
          <div className="profile-chips">
            {SIZES.map(s=>(
              <span key={s} className={`profile-chip${pSize===s?" active":""}`} onClick={()=>setPSize(s===pSize?"":s)}>{s}</span>
            ))}
          </div>

          <div className="profile-modal-footer">
            <button className="btn-profile-skip" onClick={()=>handleProfileStart(true)}>跳过，直接生成</button>
            <button className="btn-profile-start" disabled={!canStart} onClick={()=>handleProfileStart(false)}>
              ✨ 开始定制解读
            </button>
          </div>
        </div>
      </div>
    )}
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{width:760,maxWidth:"calc(100vw - 32px)",padding:"22px 24px",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"flex-start"}}>
          <div style={{fontSize:16,fontWeight:800,color:"#0f172a",lineHeight:1.25}}>{item.title}</div>
          <button className="btn-cancel" onClick={onClose} style={{padding:"6px 10px",flexShrink:0}}>关闭</button>
        </div>

        <div style={{marginTop:10,color:"#64748b",fontSize:12,display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
          <span>🕒 {noDate ? <span style={{color:"#94a3b8"}}>- <span className="badge-no-date" style={{fontSize:11,verticalAlign:"middle"}}>无日期</span></span> : fmtDate(item.date)}</span>
          {item.source_name&&<span>🏛️ {item.source_name}</span>}
          {item.region&&<span>📍 {item.region}</span>}
          {item.doc_no&&<span>📄 {item.doc_no}</span>}
          {item.status&&<span>状态：{item.status}</span>}
          {item.level&&<span>层级：{item.level}</span>}
        </div>

        {item.summary&&<div style={{marginTop:14,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:12,color:"#0f172a",fontSize:13,lineHeight:1.55}}>{item.summary}</div>}

        {/* 版本时间线 */}
        {verCnt > 0 && (
          <div style={{marginTop:16}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:10}}>
              🔄 版本时间线（共 {verCnt} 版本）
            </div>
            {loadVer ? (
              <div style={{fontSize:12,color:"#94a3b8"}}>加载中…</div>
            ) : versions && versions.length>0 ? (
              <div className="version-timeline">
                {versions.map((v,i)=>(
                  <div key={v.id} className="version-item">
                    <div className={`version-dot ${i===0?"first":i===versions.length-1?"last":""}`}/>
                    <div className="version-info">
                      <div className="version-label">
                        {i===0?"📝 初始版本":i===versions.length-1?"🔔 最新版本":`更新 v${i+1}`}
                      </div>
                      <div className="version-time">{v.detected_at?v.detected_at.slice(0,19):"-"}</div>
                    </div>
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        )}

        {/* 条款变化 Diff（版本数>=2 才显示） */}
        {isLoggedIn && verCnt >= 2 && (
          <div className="diff-wrap">
            <button className="diff-toggle" onClick={toggleDiff}>
              <span>🔀</span>
              <span>{showDiff ? "▲ 收起变化 Diff" : "▼ 查看条款变化 Diff"}</span>
              <span style={{fontSize:10,color:"#94a3b8",marginLeft:"auto"}}>近两版对比</span>
            </button>
            {showDiff && (
              <div style={{marginTop:10}}>
                {loadDiff ? (
                  <div style={{fontSize:12,color:"#94a3b8",padding:"10px 0"}}>加载中…</div>
                ) : diffData && diffData.has ? (
                  <div>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:6,display:"flex",gap:12}}>
                      <span>🟡 旧版：{diffData.from_version?.detected_at?.slice(0,16)||"-"}</span>
                      <span>🟢 新版：{diffData.to_version?.detected_at?.slice(0,16)||"-"}</span>
                      <span style={{marginLeft:"auto"}}>{diffData.diff_lines||0} 行变化</span>
                    </div>
                    {diffData.diff ? (
                      <div className="diff-body">
                        {diffData.diff.split("\n").map((line,i)=>{
                          let cls = "diff-line-normal";
                          if(line.startsWith("+++") || line.startsWith("---")) cls = "diff-line-info";
                          else if(line.startsWith("+")) cls = "diff-line-add";
                          else if(line.startsWith("-")) cls = "diff-line-del";
                          else if(line.startsWith("@@")) cls = "diff-line-hunk";
                          return <div key={i} className={cls}>{line||" "}</div>;
                        })}
                      </div>
                    ) : (
                      <div style={{fontSize:12,color:"#94a3b8"}}>无变化内容</div>
                    )}
                  </div>
                ) : diffData ? (
                  <div className="diff-no-snap">
                    ℹ️ {diffData.reason || "暂无可比较的快照数据"}
                    {diffData.reason?.includes("content_snapshot") && (
                      <div style={{marginTop:6,fontSize:11,opacity:.8}}>
                        新功能已启用：下次内容变更时将自动记录快照，届时可查看 Diff。
                      </div>
                    )}
                  </div>
                ) : null}
              </div>
            )}
          </div>
        )}



        {/* ── AI 政策解读 ── */}
        {isLoggedIn && (
          <div style={{marginTop:16}}>
            {/* 未有解读时：显示触发按钮 */}
            {!analysis && !analysisLoading && (
              <div className="analysis-trigger-row">
                <button className="btn-gen-mini" onClick={()=>openProfileModal("auto")}>
                  🤖 生成解读 <span style={{fontSize:10,opacity:.8}}>(auto/省钱)</span>
                </button>
                <button className="btn-gen-pro" onClick={()=>openProfileModal("pro")}>
                  💎 更准（Pro）
                </button>
                <span style={{fontSize:11,color:"#94a3b8"}}>首次免费生成；重复点不重复计费</span>
              </div>
            )}

            {/* 加载中 */}
            {analysisLoading && (
              <div className="analysis-loading">
                <div className="spinner" style={{width:18,height:18,marginBottom:0}}/>
                正在调用 LLM 生成解读，请稍候（10-30秒）…
              </div>
            )}

            {/* API Key 未配置提示 */}
            {noKeyMsg && (
              <div className="analysis-no-key">
                🔑 <strong>需要配置 OpenAI API Key</strong><br/>
                {noKeyMsg}<br/><br/>
                设置方法：<br/>
                <code>export OPENAI_API_KEY=sk-你的key</code><br/>
                可选模型：<code>export POLICY_LLM_MINI_MODEL=gpt-4o-mini</code>（默认）<br/>
                然后重启服务：<code>python server.py</code>
              </div>
            )}

            {/* LLM 调用错误 */}
            {analysisError && (
              <div className="analysis-error">
                ❌ {analysisError}
                <button className="btn-regen" style={{marginLeft:12,fontSize:11}} onClick={()=>triggerAnalysis("auto",true)}>重试</button>
              </div>
            )}

            {/* 解读卡 */}
            {analysis && (
              <AnalysisCard
                data={analysis}
                loading={analysisLoading}
                onRegen={(mode)=>triggerAnalysis(mode,true)}
                onExportChecklist={exportChecklist}
              />
            )}
          </div>
        )}

        <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>
          {isLoggedIn&&<button className={`btn-bookmark${bookmarked?" active":""}`} onClick={toggleBookmark} title={bookmarked?"取消收藏":"收藏此政策"}>
            {bookmarked?"⭐ 已收藏":"☆ 收藏"}
          </button>}
          {isLoggedIn&&onAddToCompare&&<button className={`btn-compare-add${isInCompare?" selected":""}`} onClick={()=>onAddToCompare(item)} title="加入对比">
            {isInCompare?"✓ 已加入对比":"⚖️ 加入对比"}
          </button>}
          <button className="btn-secondary" onClick={()=>window.open(item.url,"_blank")}>打开原文 ↗</button>
          <button className="btn-secondary" onClick={()=>navigator.clipboard?.writeText(item.url||"")}>复制链接</button>
        </div>

      </div>
    </div>
  </>);
}

// ── ActiveFilters ─────────────────────────────────────────
function ActiveFilters({filters,onRemove}) {
  const pills=[];
  if(filters.keyword)   pills.push({key:"keyword",   label:`"${filters.keyword}"`});
  if(filters.region)    pills.push({key:"region",    label:`📍${filters.region}`});
  if(filters.source_id) pills.push({key:"source_id", label:`来源:${filters.source_id}`});
  if(filters.status)    pills.push({key:"status",    label:`状态:${filters.status}`});
  if(filters.level)     pills.push({key:"level",     label:`层级:${filters.level}`});
  (filters.categories||[]).forEach(c=>pills.push({key:"cat:"+c,label:c}));
  (filters.tags||[]).forEach(t=>pills.push({key:"tag:"+t,label:`#${t}`}));
  (filters.impact_on||[]).forEach(d=>pills.push({key:"impact:"+d,label:`影响:${d}`}));
  if(!pills.length) return null;
  const prominent = (filters.tags||[]).length>0;
  return (
    <div className={`active-filters ${prominent?"prominent":""}`}>
      {prominent && <span className="af-label">当前已过滤：</span>}
      {pills.map(p=>(
        <span key={p.key} className="af-pill">{p.label}<button onClick={()=>onRemove(p.key)}>×</button></span>
      ))}
    </div>
  );
}

// ── ListView ──────────────────────────────────────────────
function ListView({catCounts,regions,regionCounts,sources,onAddToCompare,compareIds}) {
  const [items,setItems]     = useState([]);
  const [total,setTotal]     = useState(0);
  const [loading,setLoading] = useState(false);
  const [error,setError]     = useState(null);
  const [days,setDays]           = useState(30);
  const [categories,setCats]     = useState([]);
  const [region,setRegion]       = useState("");
  const [sourceId,setSrc]        = useState("");
  const [tags,setTags]           = useState([]);
  const [status,setStatus]       = useState("");
  const [level,setLevel]         = useState("");
  const [impactOn,setImpact]     = useState([]);
  const [keyword,setKeyword]     = useState("");
  const [inputKw,setInputKw]     = useState("");
  const [relevantOnly,setRelOnly]= useState(false);
  const [offset,setOffset]   = useState(0);
  const [showTags,setShowTags]= useState(true);
  const [lcRC,setLcRC]       = useState(regionCounts||{});
  const [lcCC,setLcCC]       = useState(catCounts||{});
  const [lcSC,setLcSC]       = useState({});  // status counts
  const [lcLC,setLcLC]       = useState({});  // level counts
  const [lcIC,setLcIC]       = useState({});  // impact counts
  const [lcRegions,setLcRegions] = useState([]); // regions with data
  const [selItem,setSelItem] = useState(null);
  const LIMIT = 25;

  useEffect(()=>{
    fetch(`/api/filters/meta?days=${days}`).then(r=>r.json()).then(d=>{
      setLcRC(d.region_counts||{});
      setLcCC(d.category_counts||{});
      setLcSC(d.status_counts||{});
      setLcLC(d.level_counts||{});
      setLcIC(d.impact_counts||{});
      setLcRegions(d.regions||[]);
    }).catch(()=>{});
  },[days]);

  const doFetch = useCallback(async(off)=>{
    setLoading(true); setError(null);
    try {
      const p = new URLSearchParams();
      p.set("days",days); p.set("limit",LIMIT); p.set("offset",off);
      categories.forEach(c=>p.append("categories",c));
      if(region) p.set("region",region);
      if(sourceId) p.set("source_id",sourceId);
      tags.forEach(t=>p.append("tags",t));
      if(status) p.set("status",status);
      if(level)  p.set("level",level);
      impactOn.forEach(d=>p.append("impact_on",d));
      if(keyword) p.set("keyword",keyword);
      if(relevantOnly) p.set("relevant_only","true");
      const res = await fetch(`/api/items?${p}`,{credentials:"include"});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      setItems(d.items||[]); setTotal(d.total||0);
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  },[days,categories,region,sourceId,tags,status,level,impactOn,keyword]);

  // 统一由 offset 驱动拉取，避免"筛选变更 setOffset + doFetch(0)"造成的双重请求
  useEffect(()=>{ setOffset(0); },[days,categories,region,sourceId,tags,status,level,impactOn,keyword,relevantOnly]);
  useEffect(()=>{ doFetch(offset); },[offset, doFetch]);

  function resetAll(){ setDays(30);setCats([]);setRegion("");setSrc("");setTags([]);setStatus("");setLevel("");setImpact([]);setKeyword("");setInputKw("");setRelOnly(false);setOffset(0); }
  function removeFilter(key){
    if(key==="keyword"){setKeyword("");setInputKw("");}
    else if(key==="region") setRegion("");
    else if(key==="source_id") setSrc("");
    else if(key==="status") setStatus("");
    else if(key==="level") setLevel("");
    else if(key.startsWith("cat:")) setCats(p=>p.filter(x=>x!==key.slice(4)));
    else if(key.startsWith("tag:")) setTags(p=>p.filter(x=>x!==key.slice(4)));
    else if(key.startsWith("impact:")) setImpact(p=>p.filter(x=>x!==key.slice(7)));
  }

  const filters = {keyword,region,source_id:sourceId,status,level,categories,tags,impact_on:impactOn};
  const totalPages = Math.ceil(total/LIMIT);
  const currentPage= Math.floor(offset/LIMIT)+1;
  const activeCount= categories.length+tags.length+impactOn.length+(region?1:0)+(sourceId?1:0)+(status?1:0)+(level?1:0)+(keyword?1:0);

  return (
    <div className="main-layout" style={{padding:0,gap:16}}>
      <div className="sidebar" style={{top:0}}>
        {/* 相关性过滤 */}
        <div className="filter-card" style={{background: relevantOnly ? "linear-gradient(135deg,#ecfdf5,#d1fae5)" : undefined, borderColor: relevantOnly ? "#22c55e" : undefined}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div className="filter-title" style={{marginBottom:2}}>⚡ 仅看相关政策</div>
              <div style={{fontSize:11,color:"#64748b"}}>只显示与储能直接相关的 ~711 条</div>
            </div>
            <div
              onClick={()=>setRelOnly(v=>!v)}
              style={{width:42,height:24,borderRadius:12,background:relevantOnly?"#22c55e":"#cbd5e1",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}
            >
              <div style={{position:"absolute",top:3,left:relevantOnly?20:3,width:18,height:18,borderRadius:9,background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.2)",transition:"left .2s"}}/>
            </div>
          </div>
        </div>
        <div className="filter-card"><div className="filter-title">🕐 时间范围</div><div className="chip-group">{TIME_OPTIONS.map(o=><Chip key={o.days} label={o.label} active={days===o.days} onClick={()=>setDays(o.days)}/>)}</div></div>
        <div className="filter-card"><div className="filter-title">📂 分类类型</div><div className="chip-group">{CATEGORY_TYPES.map(c=>{const cnt=lcCC?.[c]??null;return <CatChip key={c} label={c} count={cnt} maxCount={Math.max(...Object.values(lcCC||{}),1)} disabled={cnt===0} active={categories.includes(c)} onClick={()=>setCats(toggle(categories,c))}/>;})}</div></div>
        <div className="filter-card"><div className="filter-title">🏷️ 主题标签</div><div className="chip-group">{TAGS_PRESET.map(t=><Chip key={t} label={t} active={tags.includes(t)} onClick={()=>setTags(toggle(tags,t))}/>)}</div></div>
        <div className="filter-card">
          <div className="filter-title">🗺️ 地区 / 来源</div>
          <div className="filter-section"><span className="filter-label">地区</span><select value={region} onChange={e=>setRegion(e.target.value)}><option value="">全部地区</option>{(lcRegions.length?lcRegions:regions||[]).filter(r=>r).map(r=>{const cnt=lcRC?.[r]??0;return <option key={r} value={r}>{r}{cnt?` (${cnt})`:""}</option>;})}</select></div>
          <div className="filter-section"><span className="filter-label">来源</span><select value={sourceId} onChange={e=>setSrc(e.target.value)}><option value="">全部来源</option>{(sources||[]).map(s=><option key={s.id} value={s.id}>{s.name}{s.item_count?` (${s.item_count})`:""}</option>)}</select></div>
        </div>
        <div className="filter-card">
          <div className="filter-title">📋 状态 / 层级</div>
          <div className="filter-section"><span className="filter-label">文件状态</span><div className="chip-group">{STATUS_OPTIONS.map(s=>{const cnt=lcSC?.[s]??0;return <Chip key={s} label={`${s}${cnt?` (${cnt})`:""}`} active={status===s} disabled={cnt===0} onClick={()=>setStatus(status===s?"":s)}/>;})}</div></div>
          <div className="filter-section"><span className="filter-label">政策层级</span><div className="chip-group">{LEVEL_OPTIONS.map(l=>{const cnt=lcLC?.[l]??0;return <Chip key={l} label={`${l}${cnt?` (${cnt})`:""}`} active={level===l} disabled={cnt===0} onClick={()=>setLevel(level===l?"":l)}/>;})}</div></div>
        </div>
        <div className="filter-card"><div className="filter-title">🎯 影响域</div><div className="chip-group">{IMPACT_OPTIONS.map(d=>{const s=IMPACT_STYLE[d]||{};const on=impactOn.includes(d);const cnt=lcIC?.[d]??0;return <button key={d} className="chip" disabled={cnt===0&&!on} style={on?{background:s.c,borderColor:s.c,color:"#fff",opacity:1}:{background:s.bg,borderColor:s.c+"66",color:s.c,opacity:cnt>0?1:0.4}} onClick={()=>cnt>0||on?setImpact(toggle(impactOn,d)):null}>{d}{cnt?<span style={{marginLeft:4,fontSize:10,opacity:.7}}>{cnt}</span>:null}</button>;})}</div></div>
        <button className="btn-reset" onClick={resetAll}>↺ 重置全部筛选{activeCount>0?` (${activeCount})`:""}</button>
      </div>
      <div className="content">
        <div className="search-row">
          <input type="text" placeholder="关键词搜索（标题/摘要/文号）…" value={inputKw} onChange={e=>setInputKw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setKeyword(inputKw)}/>
          <button className="btn-search" onClick={()=>setKeyword(inputKw)}>搜索</button>
        </div>
        <ActiveFilters filters={filters} onRemove={removeFilter}/>
        <div className="result-bar"><span>共 <strong>{total}</strong> 条结果</span><span className="pg-info">第 {currentPage} / {Math.max(1,totalPages)} 页</span></div>
        {loading?<div className="loading"><div className="spinner"/>加载中…</div>
          :error?<div className="empty"><div className="empty-icon">⚠️</div><div>加载失败: {error}</div></div>
          :items.length===0?<div className="empty"><div className="empty-icon">📭</div><div>暂无匹配数据</div></div>
          :<>
            <div className="item-list">{items.map(item=><ItemCard key={item.id} item={item} onOpen={setSelItem}/>)}</div>
            {totalPages>1&&<div className="pagination"><button className="pg-btn" disabled={offset===0} onClick={()=>setOffset(Math.max(0,offset-LIMIT))}>← 上一页</button><span className="pg-info">{currentPage} / {totalPages}</span><button className="pg-btn" disabled={offset+LIMIT>=total} onClick={()=>setOffset(offset+LIMIT)}>下一页 →</button></div>}
            <ItemModal item={selItem} onClose={()=>setSelItem(null)} isLoggedIn={true} onAddToCompare={onAddToCompare} isInCompare={!!(compareIds&&selItem&&compareIds.includes(selItem.id))}/>
          </>}
      </div>
    </div>
  );
}

// ── SourceStatusView ──────────────────────────────────────
function SourceStatusView() {
  const [data,setData]       = useState(null);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    fetch("/api/scrape-status",{credentials:"include"}).then(r=>r.json()).then(setData).catch(console.error).finally(()=>setLoading(false));
  },[]);
  if(loading) return <div className="loading"><div className="spinner"/>加载中…</div>;

  const errorSrcs    = sources.filter(s=>s.error).length;
  const runSrcs      = sources.filter(s=>s.last_run_at).length;
  const totalItems   = sources.reduce((s,r)=>s+(r.item_count||0),0);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

          {k:"有错来源",  v:errorSrcs,  sub:errorSrcs>0?"需要检查":"全部正常", ico:"⚠️", accent:errorSrcs>0?"#ef4444":"#22c55e"},

              <div className="stat-card-label">{c.k}</div>
              <div className="stat-card-ico">{c.ico}</div>
            </div>
            <div className="stat-card-value" style={c.k==="有错来源"&&errorSrcs>0?{color:"#ef4444"}:{}}>{c.v}</div>
            <div className="stat-card-sub">{c.sub}</div>

      <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:"var(--radius)",boxShadow:"var(--shadow)",overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>📋 各来源状态详情</span>

        </div>
        <table className="source-table">
          <thead><tr><th>来源</th><th>地区</th><th>类型</th><th>最近抓取</th><th style={{textAlign:"right"}}>发现</th><th style={{textAlign:"right"}}>新增</th><th style={{textAlign:"right"}}>收录总数</th><th>状态</th></tr></thead>
          <tbody>{sources.map(s=>(
            <tr key={s.source_id}>
              <td><div style={{fontWeight:600,color:"#0f172a"}}>{s.name}</div><div style={{fontSize:10,color:"#94a3b8"}}>{s.source_id}</div></td>
              <td><span style={{fontSize:12,color:"#16a34a"}}>{s.region||"全国"}</span></td>
              <td><span style={{fontSize:11,background:"#f1f5f9",color:"#475569",padding:"1px 6px",borderRadius:4}}>{s.type}</span></td>
              <td style={{fontSize:12,color:"#64748b"}}>{s.last_run_at?fmtTs(s.last_run_at):"从未运行"}</td>
              <td style={{textAlign:"right",fontSize:12}}>{s.items_found||0}</td>
              <td style={{textAlign:"right",fontSize:12,color:"#16a34a",fontWeight:600}}>{s.items_new||0}</td>
              <td style={{textAlign:"right",fontSize:12,fontWeight:700}}>{s.item_count||0}</td>
              <td>{s.error?<span><span className="status-dot error"/>⚠️ <span style={{fontSize:11,color:"#dc2626"}} title={s.error}>错误</span></span>:s.last_run_at?<span><span className="status-dot ok"/>正常</span>:<span><span className="status-dot never"/>待运行</span>}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      {recent_log&&recent_log.length>0&&(
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:8}}>📜 最近抓取日志</div>
          <div className="log-card">{recent_log.map((l,i)=>(
            <div key={i} className="log-row">
              <span className="log-ts">{l.run_at?l.run_at.slice(0,16):"-"}</span>
              <span className="log-src">{l.source_id}</span>
              <span className="log-num">+{l.items_new||0}</span>
              {l.error&&<span className="log-err" title={l.error}>⚠️ 错误</span>}
            </div>
          ))}</div>
        </div>
      )}
      <div style={{background:"#f8fafc",border:"1px solid var(--border)",borderRadius:8,padding:"12px 16px",fontSize:12,color:"#64748b"}}>
        <div style={{fontWeight:600,marginBottom:6}}>💡 运行说明</div>
        <div>• 数据更新：运行 policy_intel.py 重新采集各源</div>
      </div>
    </div>
  );
}

// ── ProvinceCompareView ──────────────────────────────────
const ALL_PROVINCES = ["北京","天津","上海","重庆","河北","山西","内蒙古","辽宁","吉林","黑龙江","江苏","浙江","安徽","福建","江西","山东","河南","湖北","湖南","广东","广西","海南","四川","贵州","云南","西藏","陕西","甘肃","青海","宁夏","新疆","全国"];

function ProvinceCompareView() {
  const [selected, setSelected] = useState([]);
  const [category, setCategory] = useState("");
  const [loading, setLoading]   = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult]   = useState(null);
  const [hasAiKey, setHasAiKey]   = useState(false);

  useEffect(()=>{
    fetch("/api/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({q:"__ai_check__",limit:0,offset:0})})
      .then(r=>r.json()).then(d=>{ if(d.ai_available) setHasAiKey(true); }).catch(()=>{});
  },[]);

  function toggleProvince(p) {
    setSelected(prev => {
      if(prev.includes(p)) return prev.filter(x=>x!==p);
      if(prev.length>=4) return prev;
      return [...prev, p];
    });
  }

  async function doCompare() {
    if(selected.length < 2) return;
    setLoading(true); setError(null); setResult(null); setAiResult(null);
    try {
      const qs = new URLSearchParams({provinces: selected.join(",")});
      if(category) qs.set("category", category);
      const r = await fetch("/api/compare-provinces?" + qs.toString());
      const d = await r.json();
      if(!r.ok) setError(d.detail || "对比失败");
      else setResult(d);
    } catch(e) { setError(String(e)); }
    finally { setLoading(false); }
  }

  async function doAiAnalysis() {
    if(!result) return;
    setAiLoading(true); setAiResult(null);
    try {
      const r = await fetch("/api/search", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          q: `请对比以下省份的储能政策差异，数据如下：\n${JSON.stringify(result.provinces, null, 2)}\n请从政策总量、近期活跃度、主要分类侧重点三个维度分析各省差异，并给出结论。`,
          limit: 0, ai_only: true
        })
      });
      const d = await r.json();
      setAiResult(d.answer || d.ai_answer || "未获得AI分析结果");
    } catch(e) { setAiResult("AI分析失败：" + String(e)); }
    finally { setAiLoading(false); }
  }

  const catOptions = ["","政策/规划/指导意见","补贴/财政/金融支持","标准规范","示范项目/试点清单","通知/办法/细则/实施方案","事故通报/风险预警/执法处罚","招标/采购","市场/价格/电力交易"];

  return (
    <div style={{padding:"24px 28px",maxWidth:1100}}>
      <h2 style={{fontSize:20,fontWeight:700,color:"#1e293b",marginBottom:4}}>⚖️ 省份政策对比</h2>
      <p style={{color:"#64748b",fontSize:13,marginBottom:20}}>选择 2–4 个省份，查看政策数量、分类分布及最新动态对比</p>

      {/* 省份选择器 */}
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>
          选择省份（已选 {selected.length}/4）
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {ALL_PROVINCES.map(p=>{
            const on = selected.includes(p);
            const disabled = !on && selected.length>=4;
            return (
              <button key={p} onClick={()=>!disabled&&toggleProvince(p)}
                style={{padding:"5px 12px",borderRadius:6,fontSize:12,fontWeight:600,cursor:disabled?"not-allowed":"pointer",
                  border:`1.5px solid ${on?"#4f46e5":"#e2e8f0"}`,
                  background:on?"#eef2ff":"#fff",color:on?"#4f46e5":disabled?"#cbd5e1":"#374151",
                  transition:"all .12s"}}>
                {p}
              </button>
            );
          })}
        </div>
      </div>

      {/* 分类筛选 + 操作 */}
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
        <select value={category} onChange={e=>setCategory(e.target.value)}
          style={{padding:"7px 12px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:13,color:"#374151",background:"#fff",minWidth:200}}>
          {catOptions.map(c=><option key={c} value={c}>{c||"全部分类"}</option>)}
        </select>
        <button onClick={doCompare} disabled={selected.length<2||loading}
          style={{padding:"8px 22px",background:selected.length<2?"#e2e8f0":"#4f46e5",color:selected.length<2?"#94a3b8":"#fff",
            border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:selected.length<2?"not-allowed":"pointer"}}>
          {loading ? "对比中…" : "开始对比"}
        </button>
        {selected.length>0&&<button onClick={()=>{setSelected([]);setResult(null);setAiResult(null);}}
          style={{padding:"7px 14px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,fontSize:12,cursor:"pointer"}}>
          清空
        </button>}
      </div>

      {error && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",color:"#dc2626",fontSize:13,marginBottom:16}}>{error}</div>}

      {/* 对比结果表格 */}
      {result && (
        <div>
          <div style={{overflowX:"auto",marginBottom:20}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#f1f5f9"}}>
                  {["省份","政策总数","近30天新增","主要分类分布（Top 3）","最新3条政策"].map(h=>(
                    <th key={h} style={{padding:"10px 14px",textAlign:"left",fontWeight:700,color:"#374151",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {result.provinces.map((prov,i)=>(
                  <tr key={prov.province} style={{background:i%2===0?"#fff":"#f8fafc",verticalAlign:"top"}}>
                    <td style={{padding:"12px 14px",fontWeight:700,color:"#1e293b",borderBottom:"1px solid #f1f5f9",whiteSpace:"nowrap"}}>
                      {prov.province}
                    </td>
                    <td style={{padding:"12px 14px",borderBottom:"1px solid #f1f5f9",textAlign:"center"}}>
                      <span style={{fontSize:22,fontWeight:800,color:"#4f46e5"}}>{prov.total}</span>
                    </td>
                    <td style={{padding:"12px 14px",borderBottom:"1px solid #f1f5f9",textAlign:"center"}}>
                      <span style={{fontSize:18,fontWeight:700,color:prov.recent_30d>0?"#059669":"#94a3b8"}}>{prov.recent_30d}</span>
                    </td>
                    <td style={{padding:"12px 14px",borderBottom:"1px solid #f1f5f9",maxWidth:220}}>
                      {prov.top_categories.slice(0,3).map(c=>(
                        <div key={c.name} style={{marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                          <div style={{flex:1,fontSize:11,color:"#475569",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                          <span style={{fontSize:11,fontWeight:700,color:"#4f46e5",background:"#eef2ff",padding:"1px 6px",borderRadius:10,flexShrink:0}}>{c.count}</span>
                        </div>
                      ))}
                      {prov.top_categories.length===0&&<span style={{color:"#cbd5e1",fontSize:12}}>暂无数据</span>}
                    </td>
                    <td style={{padding:"12px 14px",borderBottom:"1px solid #f1f5f9",maxWidth:280}}>
                      {prov.latest_3.map(item=>(
                        <div key={item.id} style={{marginBottom:8,paddingBottom:8,borderBottom:"1px dashed #f1f5f9"}}>
                          <div style={{fontSize:12,fontWeight:600,color:"#1e293b",lineHeight:1.4,marginBottom:2}}>{item.title}</div>
                          <div style={{fontSize:11,color:"#94a3b8"}}>{item.date}</div>
                        </div>
                      ))}
                      {prov.latest_3.length===0&&<span style={{color:"#cbd5e1",fontSize:12}}>暂无数据</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* AI深度对比 */}
          {hasAiKey && (
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:16}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:aiResult?12:0}}>
                <span style={{fontSize:13,fontWeight:700,color:"#166534"}}>✨ AI 深度对比分析</span>
                <button onClick={doAiAnalysis} disabled={aiLoading}
                  style={{padding:"6px 16px",background:aiLoading?"#d1fae5":"#16a34a",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:700,cursor:aiLoading?"not-allowed":"pointer"}}>
                  {aiLoading ? "分析中…" : "生成AI分析"}
                </button>
              </div>
              {aiResult && (
                <div style={{fontSize:13,color:"#166534",lineHeight:1.7,whiteSpace:"pre-wrap",marginTop:8,background:"#fff",borderRadius:8,padding:14,border:"1px solid #d1fae5"}}>
                  {aiResult}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── CompareBar（全局对比托盘）─────────────────────────────
function CompareBar({items, onRemove, onClear}) {
  const [loading, setLoading]   = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState(null);
  const [showModal, setShowModal] = useState(false);

  // CompareBar 出现时给 body 加类，防止遮住底部内容（items 变化也保持一致）
  useEffect(()=>{
    if(items && items.length>0) document.body.classList.add('has-compare-bar');
    return ()=>{ document.body.classList.remove('has-compare-bar'); };
  },[items.length]);

  async function doCompare() {
    if(items.length < 2) return;
    setLoading(true); setResult(null); setError(null);
    try {
      const r = await fetch("/api/compare", {
        method:"POST", credentials:"include",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({item_id_a: items[0].id, item_id_b: items[1].id}),
      });
      const d = await r.json();
      if(!r.ok) { setError(d.detail||"对比失败"); } else { setResult(d); setShowModal(true); }
    } catch(e) { setError("网络错误"); }
    finally { setLoading(false); }
  }

  return (<>
    <div className="compare-bar">
      <span style={{fontSize:13,fontWeight:700,flexShrink:0}}>⚖️ 对比模式</span>
      {items.map((it,i)=>(
        <div key={it.id} className="compare-bar-item" title={it.title}>
          <span style={{opacity:.6,marginRight:4}}>{i===0?"A:":"B:"}</span>{it.title}
          <span style={{marginLeft:6,cursor:"pointer",opacity:.7}} onClick={()=>onRemove(it.id)}>✕</span>
        </div>
      ))}
      {items.length<2&&<span style={{fontSize:12,opacity:.6}}>再选一篇政策即可对比</span>}
      {items.length>=2&&(
        <button className="btn-compare-go" onClick={doCompare} disabled={loading}>
          {loading?"分析中…":"🤖 AI对比分析"}
        </button>
      )}
      {error&&<span style={{color:"#fca5a5",fontSize:12}}>{error}</span>}
      <button className="btn-compare-clear" style={{marginLeft:"auto"}} onClick={onClear}>清空</button>
    </div>

    {showModal&&result&&(
      <div className="modal-overlay" onClick={()=>setShowModal(false)}>
        <div className="modal-box" style={{width:720,maxWidth:"calc(100vw-32px)",padding:"24px 26px",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:16,fontWeight:800}}>⚖️ 政策对比分析</div>
            <button className="btn-cancel" onClick={()=>setShowModal(false)}>关闭</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[result.item_a,result.item_b].map((it,i)=>(
              <div key={i} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontWeight:700,fontSize:11,color:"#6366f1",marginBottom:4}}>文件{i===0?"A":"B"}</div>
                <div style={{fontSize:13,color:"#0f172a",fontWeight:600}}>{it.title}</div>
                {it.date&&<div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{it.date}</div>}
              </div>
            ))}
          </div>
          {result.compare?.summary&&(
            <div style={{background:"#eef2ff",borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:14,color:"#3730a3",fontWeight:600}}>
              💡 {result.compare.summary}
            </div>
          )}
          {[
            {key:"key_diffs",title:"🔄 核心差异"},
            {key:"added",    title:"➕ 新增要求"},
            {key:"removed",  title:"➖ 删除/放宽"},
            {key:"actions",  title:"✅ 企业应对建议"},
          ].map(({key,title})=>result.compare?.[key]?.length>0&&(
            <div key={key} className="compare-section">
              <h4>{title}</h4>
              <ul>{result.compare[key].map((s,i)=><li key={i}>{s}</li>)}</ul>
            </div>
          ))}
        </div>
      </div>
    )}
  </>);
}

// ── NotificationsView ─────────────────────────────────────
function NotificationsView({onUnreadChange}) {
  const [tab,setTab]         = useState("unread");
  const [notifs,setNotifs]   = useState([]);
  const [total,setTotal]     = useState(0);
  const [unread,setUnread]   = useState(0);
  const [loading,setLoading] = useState(false);
  const [offset,setOffset]   = useState(0);
  const LIMIT = 40;

  async function load(off,unreadOnly) {
    setLoading(true);
    try {
      const r = await fetch(`/api/notifications?unread_only=${unreadOnly}&limit=${LIMIT}&offset=${off}`,{credentials:"include"});
      const d = await r.json();
      setNotifs(d.notifications||[]); setTotal(d.total||0); setUnread(d.unread||0);
      if(onUnreadChange) onUnreadChange(d.unread||0);
    } finally { setLoading(false); }
  }

  useEffect(()=>{ setOffset(0); load(0, tab==="unread"); },[tab]);
  const prevOff2 = useRef(0);
  useEffect(()=>{ if(offset!==prevOff2.current){prevOff2.current=offset;load(offset,tab==="unread");} },[offset]);

  async function markRead(id) { await fetch(`/api/notifications/${id}/read`,{method:"POST",credentials:"include"}); load(offset, tab==="unread"); }
  async function markAllRead() { await fetch("/api/notifications/read-all",{method:"POST",credentials:"include"}); load(0, tab==="unread"); }

  const totalPages  = Math.ceil(total/LIMIT);
  const currentPage = Math.floor(offset/LIMIT)+1;

  return (
    <div>
      <div className="notif-toolbar">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div className="notif-tabs">
            <button className={`notif-tab ${tab==="unread"?"active":""}`} onClick={()=>{setTab("unread");setOffset(0);}}>未读 {unread>0&&<span className="notif-badge">{unread}</span>}</button>
            <button className={`notif-tab ${tab==="all"?"active":""}`} onClick={()=>{setTab("all");setOffset(0);}}>全部</button>
          </div>
          <span style={{fontSize:12,color:"#94a3b8"}}>共 {total} 条</span>
        </div>
        {unread>0&&<button className="btn-secondary" onClick={markAllRead}>✓ 全部标记已读</button>}
      </div>
      {loading?<div className="loading"><div className="spinner"/>加载中…</div>
       :notifs.length===0?(<div className="empty"><div className="empty-icon">{tab==="unread"?"🎉":"📭"}</div><div>{tab==="unread"?"暂无未读通知":"暂无通知"}</div><div style={{fontSize:12,marginTop:8,color:"#94a3b8"}}>匹配订阅的新内容会在这里显示</div></div>)
       :(
        <>
          <div className="notif-list">
            {notifs.map(n=>(
              <div key={n.id} className={`notif-item ${n.is_read?"read":"unread"}`}>
                <div className={`notif-dot ${n.is_read?"read":""}`}/>
                <div className="notif-body">
                  <div className="notif-message">{n.message}</div>
                  <div className="notif-meta">
                    <span>🕐 {fmtTs(n.created_at)}</span>
                    {n.sub_name&&<span>📬 {n.sub_name}</span>}
                    {n.item_region&&n.item_region!=="全国"&&<span>📍{n.item_region}</span>}
                    {n.item_source&&<span>{n.item_source}</span>}
                  </div>
                </div>
                <div className="notif-action">
                  {n.item_url&&<button className="btn-mark-read" onClick={e=>{e.stopPropagation();window.open(n.item_url,"_blank");}}>查看 →</button>}
                  {!n.is_read&&<button className="btn-mark-read" onClick={e=>{e.stopPropagation();markRead(n.id);}}>已读</button>}
                </div>
              </div>
            ))}
          </div>
          {totalPages>1&&<div className="pagination"><button className="pg-btn" disabled={offset===0} onClick={()=>setOffset(Math.max(0,offset-LIMIT))}>← 上一页</button><span className="pg-info">{currentPage}/{totalPages}</span><button className="pg-btn" disabled={offset+LIMIT>=total} onClick={()=>setOffset(offset+LIMIT)}>下一页 →</button></div>}
        </>
       )}
    </div>
  );
}

// ── ScopeView（表单1-4落地）──────────────────────────────
function ScopeView() {
  const [data,setData] = useState(null);
  const [saving,setSaving] = useState(false);
  const [err,setErr] = useState("");
  const [ok,setOk] = useState("");

  const OPTS = [
    {v:"M", l:"Must（必须）"},
    {v:"S", l:"Should（应该）"},
    {v:"C", l:"Could（可以）"},
    {v:"W", l:"Won't（不做）"},
  ];

  async function load(){
    setErr("");
    const r = await fetch("/api/scope", {credentials:"include"});
    if(!r.ok){ setErr("加载失败"); return; }
    const d = await r.json();
    setData(d);
  }

  useEffect(()=>{ load(); },[]);

  function update(path, value){
    setOk("");
    setData(prev=>{
      const next = JSON.parse(JSON.stringify(prev||{}));
      let cur = next.config;
      for(let i=0;i<path.length-1;i++){
        const k = path[i];
        cur[k] = (cur[k]===undefined || cur[k]===null) ? {} : cur[k];
        cur = cur[k];
      }
      cur[path[path.length-1]] = value;
      return next;
    });
  }

  async function save(){
    setErr(""); setOk("");
    if(!data?.config) return;
    setSaving(true);
    try{
      const r = await fetch("/api/scope", {method:"POST", headers:{"Content-Type":"application/json"}, credentials:"include", body: JSON.stringify({config: data.config})});
      const d = await r.json();
      if(!r.ok){ setErr(d.detail||"保存失败"); return; }
      setData(d);
      setOk("已保存");
    } finally { setSaving(false); }
  }

  if(!data) return <div className="loading"><div className="spinner"/>加载中…</div>;

  const cfg = data.config || {};
  const keyProvincesStr = (cfg.form1?.key_provinces||[]).join("，");

  const Row = ({label, children}) => (
    <div style={{display:"grid", gridTemplateColumns:"260px 1fr", gap:12, padding:"10px 0", borderBottom:"1px solid #f1f5f9"}}>
      <div style={{fontSize:12, fontWeight:700, color:"#334155"}}>{label}</div>
      <div>{children}</div>
    </div>
  );

  const Select = ({value,onChange}) => (
    <select value={value||"C"} onChange={e=>onChange(e.target.value)}>
      {OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  );

  return (
    <div style={{padding:"0 2px"}}>
      <div className="result-bar" style={{marginBottom:12}}>
        <span>🧭 项目配置 / Scope（表单1-4）</span>
        <span style={{display:"flex", gap:8, alignItems:"center"}}>
          {ok&&<span style={{fontSize:12,color:"#16a34a",fontWeight:700}}>{ok}</span>}
          {err&&<span style={{fontSize:12,color:"#dc2626",fontWeight:700}}>{err}</span>}
          <button className="btn-secondary" onClick={load}>刷新</button>
          <button className="btn-primary" style={{width:"auto", padding:"8px 16px"}} disabled={saving} onClick={save}>{saving?"保存中…":"保存"}</button>
        </span>
      </div>

      <div className="filter-card" style={{padding:"16px 18px"}}>
        <div className="dash-section-title">表单1：信息范围（我们覆盖什么）</div>
        <Row label="内容桶（buckets）">
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10}}>
            <div>政策 <Select value={cfg.form1?.buckets?.policy} onChange={v=>update(["form1","buckets","policy"],v)}/></div>
            <div>补贴 <Select value={cfg.form1?.buckets?.subsidy} onChange={v=>update(["form1","buckets","subsidy"],v)}/></div>
            <div>招标 <Select value={cfg.form1?.buckets?.tender} onChange={v=>update(["form1","buckets","tender"],v)}/></div>
            <div>合规 <Select value={cfg.form1?.buckets?.compliance} onChange={v=>update(["form1","buckets","compliance"],v)}/></div>
          </div>
        </Row>
        <Row label="地域覆盖模式">
          <select value={cfg.form1?.geo_mode||"key_provinces"} onChange={e=>update(["form1","geo_mode"],e.target.value)}>
            <option value="key_provinces">重点省优先（推荐）</option>
            <option value="nationwide">全国扫面</option>
          </select>
        </Row>
        <Row label="重点省列表（逗号/空格分隔）">
          <input type="text" value={keyProvincesStr} onChange={e=>{
            const arr = e.target.value.split(/[，,\s]+/).map(x=>x.trim()).filter(Boolean);
            update(["form1","key_provinces"], arr);
          }} placeholder="例如：广东 江苏 浙江 山东 内蒙古" />
        </Row>
        <Row label="业务链/场景（先占位）">
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10}}>
            <div>工商业储能 <Select value={cfg.form1?.scenarios?.["工商业储能"]} onChange={v=>update(["form1","scenarios","工商业储能"],v)}/></div>
            <div>独立/共享储能 <Select value={cfg.form1?.scenarios?.["独立/共享储能"]} onChange={v=>update(["form1","scenarios","独立/共享储能"],v)}/></div>
            <div>电网侧 <Select value={cfg.form1?.scenarios?.["电网侧"]} onChange={v=>update(["form1","scenarios","电网侧"],v)}/></div>
          </div>
        </Row>
      </div>

      <div className="filter-card" style={{padding:"16px 18px"}}>
        <div className="dash-section-title">表单2：数据源与采集能力（我们能抓什么）</div>
        <Row label="官方站点（部委/省级）"><Select value={cfg.form2?.official_sites} onChange={v=>update(["form2","official_sites"],v)}/></Row>
        <Row label="交易/公共资源平台"><Select value={cfg.form2?.trading_centers} onChange={v=>update(["form2","trading_centers"],v)}/></Row>
        <Row label="电网/央企采购平台（ECP等）"><Select value={cfg.form2?.grid_ecp} onChange={v=>update(["form2","grid_ecp"],v)}/></Row>
        <Row label="聚合站补漏（仅公开信息）"><Select value={cfg.form2?.aggregators} onChange={v=>update(["form2","aggregators"],v)}/></Row>
        <Row label="公众号/通知类"><Select value={cfg.form2?.wechat_notices} onChange={v=>update(["form2","wechat_notices"],v)}/></Row>
        <Row label="需要登录/付费/重反爬（不做）"><Select value={cfg.form2?.login_paywalled} onChange={v=>update(["form2","login_paywalled"],v)}/></Row>
      </div>

      <div className="filter-card" style={{padding:"16px 18px"}}>
        <div className="dash-section-title">表单3：结构化字段（我们承诺提取到什么粒度）</div>
        {Object.entries(cfg.form3?.fields||{}).map(([k,v])=> (
          <Row key={k} label={k}><Select value={v} onChange={nv=>update(["form3","fields",k],nv)}/></Row>
        ))}
      </div>

      <div className="filter-card" style={{padding:"16px 18px"}}>
        <div className="dash-section-title">表单4：交付链路（网站/公众号/小程序提醒）</div>
        <Row label="网站（检索+详情）"><Select value={cfg.form4?.website} onChange={v=>update(["form4","website"],v)}/></Row>
        <Row label="微信公众号提醒（占位）"><Select value={cfg.form4?.wechat_oa} onChange={v=>update(["form4","wechat_oa"],v)}/></Row>
        <Row label="小程序（订阅/收藏/搜索入口）"><Select value={cfg.form4?.mini_program} onChange={v=>update(["form4","mini_program"],v)}/></Row>
        <Row label="提醒策略（占位）">
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10}}>
            <div>高优先级提醒 <Select value={cfg.form4?.alert_rules?.high_priority} onChange={v=>update(["form4","alert_rules","high_priority"],v)}/></div>
            <div>每日摘要 <Select value={cfg.form4?.alert_rules?.daily_digest} onChange={v=>update(["form4","alert_rules","daily_digest"],v)}/></div>
            <div>实时推送 <Select value={cfg.form4?.alert_rules?.real_time} onChange={v=>update(["form4","alert_rules","real_time"],v)}/></div>
          </div>
        </Row>
      </div>

      <div style={{fontSize:12, color:"#94a3b8", marginTop:10}}>
        说明：今晚先把表单落地为"可保存的项目配置"。第二步再把它与 sources.yaml 自动开关、筛选默认值、提醒策略等做更深联动。
      </div>
    </div>
  );
}

// ── SubscriptionsView ─────────────────────────────────────
function SubscriptionsView({smtpConfigured}) {
  const [subs,setSubs]       = useState([]);
  const [loading,setLoading] = useState(false);
  const [showForm,setShowForm]= useState(false);
  const [saving,setSaving]   = useState(false);
  const [saveErr,setSaveErr] = useState("");
  const [digestResult,setDigest] = useState(null);
  const [digestLoading,setDigestLoading] = useState(false);
  const [matchCounts,setMatchCounts] = useState({});
  const [matchBusy,setMatchBusy] = useState(false);
  const [fname,setFname]     = useState("我的订阅");
  const [fregions,setFRegions]= useState([]);
  const [fcats,setFCats]     = useState([]);
  const [fkws,setFKws]       = useState("");
  const [fbuckets,setFBuckets]= useState([]);
  const [ffreq,setFFreq]     = useState("daily");
  const [femail,setFEmail]   = useState("");
  const [fwebhook,setFWebhook]= useState("");

  async function loadMatchCounts(days=7){
    setMatchBusy(true);
    try {
      const r = await fetch(`/api/digest/daily?days=${days}&brief=true`,{credentials:"include"});
      const d = await r.json();
      const map = {};
      (d.sections||[]).forEach(sec=>{ map[sec.subscription_id] = sec.count||0; });
      setMatchCounts(map);
    } catch(ex) {
      setMatchCounts({});
    } finally {
      setMatchBusy(false);
    }
  }

  async function loadSubs(){
    setLoading(true);
    try {
      const r = await fetch("/api/subscriptions",{credentials:"include"});
      const d = await r.json();
      const list = d.subscriptions||[];
      setSubs(list);
      // 订阅列表里展示"近期匹配数量"（近7天）
      if(list.length>0) loadMatchCounts(7);
      else setMatchCounts({});
    } finally {setLoading(false);}
  }
  useEffect(()=>{loadSubs();},[]);

  async function save(){
    setSaveErr(""); setSaving(true);
    try {
      const kws = fkws.split(/[,，\s]+/).map(k=>k.trim()).filter(Boolean);
      const r = await fetch("/api/subscriptions",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
        body:JSON.stringify({name:fname,regions:fregions,categories:fcats,keywords:kws,buckets:fbuckets,frequency:ffreq,notify_email:femail,webhook_url:fwebhook})});
      const d = await r.json();
      if(!r.ok) { setSaveErr(d.detail||"创建失败"); return; }
      setShowForm(false); resetForm(); loadSubs();
    } catch(ex){ setSaveErr(ex.message); } finally { setSaving(false); }
  }
  function resetForm(){ setFname("我的订阅");setFRegions([]);setFCats([]);setFKws("");setFBuckets([]);setFFreq("daily");setFEmail("");setFWebhook(""); }

  async function deleteSub(id){
    if(!confirm("确认删除该订阅？")) return;
    await fetch(`/api/subscriptions/${id}`,{method:"DELETE",credentials:"include"});
    loadSubs();
  }

  async function runDigest(){
    setDigestLoading(true); setDigest(null);
    try { const r = await fetch("/api/digest/daily?days=1",{credentials:"include"}); const d = await r.json(); setDigest(d); } finally { setDigestLoading(false); }
  }

  async function downloadReport(){
    const r = await fetch("/api/report/weekly?format=md",{credentials:"include"});
    const text = await r.text();
    const blob = new Blob([text],{type:"text/markdown"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`policy_weekly_${new Date().toISOString().slice(0,10)}.md`;
    a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>📬 订阅管理</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-secondary" onClick={runDigest} disabled={digestLoading}>{digestLoading?"生成中…":"📄 今日摘要"}</button>
          <button className="btn-secondary" onClick={downloadReport}>⬇️ 下载周报 .md</button>
          <button className="btn-create" onClick={()=>{setShowForm(!showForm);setSaveErr("");}}>＋ 新建订阅</button>
        </div>
      </div>
      {smtpConfigured?<div className="smtp-hint">✅ SMTP 已配置：设置「通知邮箱」后，即时频率订阅会自动发送邮件</div>:<div className="smtp-warn">📬 SMTP 未配置，仅提供站内通知。详见 README。</div>}
      {showForm&&(
        <div className="create-form active">
          <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:14}}>新建订阅</div>
          {saveErr&&<div className="auth-error" style={{marginBottom:14}}>⚠️ {saveErr}</div>}
          <div className="form-row">
            <div className="form-field"><label>订阅名称 *</label><input value={fname} onChange={e=>setFname(e.target.value)} placeholder="如：储能招标日报"/></div>
            <div className="form-field"><label>推送频率</label><select value={ffreq} onChange={e=>setFFreq(e.target.value)}><option value="daily">📅 每日汇总</option><option value="instant">⚡ 即时推送</option></select></div>
          </div>
          <div className="form-section"><div className="form-section-title">关键词（逗号/空格分隔，为空=不限）</div><input type="text" value={fkws} onChange={e=>setFKws(e.target.value)} placeholder="PCS, EMS, 并网测试…" style={{padding:"7px 10px",border:"1.5px solid var(--border)",borderRadius:7,fontSize:13,width:"100%"}}/></div>
          <div className="form-section"><div className="form-section-title">监控地区（为空=全国）</div><div className="chip-group">{REGION_LIST.map(r=><button key={r} className={`chip ${fregions.includes(r)?"active":""}`} onClick={()=>setFRegions(toggle(fregions,r))}>{r}</button>)}</div></div>
          <div className="form-section"><div className="form-section-title">内容桶（为空=全部）</div><div className="chip-group">{BUCKET_OPTS.map(b=><button key={b.v} className={`chip ${fbuckets.includes(b.v)?"active":""}`} onClick={()=>setFBuckets(toggle(fbuckets,b.v))}>{b.l}</button>)}</div></div>
          <div className="form-section"><div className="form-section-title">分类筛选（为空=全部）</div><div className="chip-group">{CATEGORY_TYPES.map(c=>{const i=CATEGORY_TYPES.indexOf(c);const color=CAT_COLORS[i]||"#64748b";const bg=CAT_BG[i]||"#f1f5f9";const on=fcats.includes(c);return <button key={c} className="cat-chip" style={on?{background:color,borderColor:color,color:"#fff"}:{background:bg,borderColor:color+"44",color}} onClick={()=>setFCats(toggle(fcats,c))}>{c}</button>;})}</div></div>
          <div className="form-row" style={{marginBottom:16}}>
            <div className="form-field"><label>通知邮箱（可选）</label><input type="email" value={femail} onChange={e=>setFEmail(e.target.value)} placeholder="team@company.com"/><div className="form-hint">{ffreq==="instant"?"即时推送邮件":"摘要推送邮件"}</div></div>
            <div className="form-field"><label>Webhook URL（占位）</label><input type="url" value={fwebhook} onChange={e=>setFWebhook(e.target.value)} placeholder="https://…"/><div className="form-hint">企业微信/钉钉 Webhook（未来版本）</div></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-cancel" onClick={()=>{setShowForm(false);setSaveErr("");resetForm();}}>取消</button>
            <button className="btn-create" onClick={save} disabled={saving||!fname.trim()}>{saving?"保存中…":"✓ 创建订阅"}</button>
          </div>
        </div>
      )}
      {loading?<div className="loading"><div className="spinner"/>加载中…</div>
       :subs.length===0&&!showForm?(<div className="empty"><div className="empty-icon">📭</div><div>暂无订阅</div><div style={{fontSize:12,marginTop:8}}>点击「新建订阅」创建第一个</div></div>)
       :subs.map(s=>(
        <div key={s.id} className="sub-card">
          <div className="sub-card-header">
            <div><span className="sub-name">{s.name}</span><span className={`sub-freq ${s.frequency==="instant"?"instant":""}`}>{s.frequency==="instant"?"⚡ 即时":"📅 每日"}</span></div>
            <button className="btn-delete" onClick={()=>deleteSub(s.id)}>删除</button>
          </div>
          <div className="sub-meta">
            {s.regions&&s.regions.length>0&&s.regions.map(r=><span key={r} className="sub-tag">📍{r}</span>)}
            {s.buckets&&s.buckets.length>0&&s.buckets.map(b=><span key={b} className="sub-tag">{BUCKET_OPTS.find(x=>x.v===b)?.l||b}</span>)}
            {s.keywords&&s.keywords.length>0&&<span className="sub-tag">🔍 {s.keywords.slice(0,3).join("、")}{s.keywords.length>3?`…+${s.keywords.length-3}`:""}</span>}
            {s.categories&&s.categories.length>0&&<span className="sub-tag">📂 {s.categories.length} 个分类</span>}
            {s.notify_email&&<span className="sub-tag" title={s.notify_email} style={{background:"#f0fdf4",color:"#16a34a"}}>📧 邮件推送已开启</span>}
          </div>
          <div style={{fontSize:12,color:"#64748b",marginTop:8}}>
            匹配到 <strong style={{color:"#0f172a"}}>{matchBusy?"…":(matchCounts[s.id]??0)}</strong> 条近期政策 <span style={{color:"#94a3b8"}}>（近7天）</span>
          </div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>创建于 {s.created_at?s.created_at.slice(0,10):"-"}</div>
        </div>
       ))}

function SearchView() {
  const [q,setQ]             = useState("");
  const [inputQ,setInputQ]   = useState("");
  const [results,setResults] = useState(null);
  const [loading,setLoading] = useState(false);
  const [limit,setLimit]     = useState(20);
  const [selItem,setSelItem] = useState(null);
  const [aiMode,setAiMode]   = useState(false);

  async function doSearch(query) {
    if(!query.trim()) return;
    setLoading(true); setResults(null);
    try {
      if(aiMode) {
        const r = await fetch('/api/ai/search',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({query})});
        const d = await r.json();
        if(!r.ok) { setResults({error:d.detail||'AI 检索失败',items:[],total:0,ai:true}); return; }
        setResults({...d, ai:true});
      } else {
        const r = await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=${limit}`,{credentials:"include"});
        const d = await r.json();
        setResults(d);
      }
    } catch(e) { setResults({error:e.message,items:[],total:0}); }
    finally { setLoading(false); }
  }

  function submit(e) { e.preventDefault(); const q2=inputQ.trim(); if(q2){setQ(q2);doSearch(q2);} }

  const EXAMPLES = ["储能补贴","并网测试要求","BESS消防标准","试点项目申报","电化学储能安全"];

  return (
    <div className="fts-wrap">
      <div className="fts-hero">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div className="fts-hero-title">{aiMode?"🤖 问政策 · AI 智能检索":"🔍 问政策 · 全文检索"}</div>
            <div className="fts-hero-sub">{aiMode?"GPT-4o-mini 语义理解 · 付费功能":"基于 SQLite FTS5 · 秒级搜索 title / 摘要 / 正文全文 · 0 成本"}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.12)",borderRadius:20,padding:"4px 12px",cursor:"pointer",userSelect:"none"}}
            onClick={()=>{setAiMode(m=>!m);setResults(null);}}>
            <span style={{fontSize:12,color:"#e2e8f0"}}>FTS</span>
            <div style={{width:32,height:18,borderRadius:9,background:aiMode?"#6366f1":"#64748b",position:"relative",transition:"background .2s"}}>
              <div style={{position:"absolute",top:2,left:aiMode?14:2,width:14,height:14,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
            </div>
            <span style={{fontSize:12,color:"#e2e8f0"}}>AI</span>
          </div>
        </div>
        <form onSubmit={submit} className="fts-search-row" style={{marginTop:12}}>
          <input
            className="fts-input"
            type="text"
            autoFocus
            placeholder={aiMode?"用自然语言提问，如：有哪些针对独立储能的补贴政策？":"输入关键词，如：补贴申报、消防验收、并网检测…"}
            value={inputQ}
            onChange={e=>setInputQ(e.target.value)}
          />
          <button type="submit" className="fts-btn" disabled={loading||!inputQ.trim()}>
            {loading?"搜索中…":aiMode?"AI 搜索":"搜索"}
          </button>
        </form>
        <div className="fts-hint">
          示例：{EXAMPLES.map(ex=>(
            <span key={ex} style={{cursor:"pointer",marginRight:10,textDecoration:"underline dotted",opacity:.8}}
              onClick={()=>{setInputQ(ex);setQ(ex);doSearch(ex);}}>
              {ex}
            </span>
          ))}
        </div>
      </div>

      {/* 结果 */}
      {loading && <div className="loading"><div className="spinner"/>{aiMode?"AI 检索中…":"全文检索中…"}</div>}

      {/* AI 模式结果 */}
      {results && results.ai && !loading && (
        <>
          {results.error && <div style={{color:"#dc2626",fontSize:12,marginBottom:12}}>⚠️ {results.error}</div>}
          {results.summary && <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#1e40af"}}>{results.summary}</div>}
          {(results.items||[]).length===0 && !results.error && <div className="empty"><div className="empty-icon">🤖</div><div>未找到相关政策</div></div>}
          <div>
            {(results.items||[]).map(item=>(
              <div key={item.id} className="fts-result-item" onClick={()=>setSelItem(item)}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                  <div className="fts-result-title" style={{flex:1}}>{item.title}</div>
                  {item.ai_relevance&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:item.ai_relevance==="高"?"#dcfce7":item.ai_relevance==="中"?"#fef9c3":"#f1f5f9",color:item.ai_relevance==="高"?"#15803d":item.ai_relevance==="中"?"#854d0e":"#64748b",whiteSpace:"nowrap"}}>{item.ai_relevance}</span>}
                </div>
                {item.ai_key_point&&<div style={{fontSize:12,color:"#6366f1",marginTop:4}}>{item.ai_key_point}</div>}
                <div className="fts-result-meta">
                  {item.region&&<span className="badge badge-region">{item.region}</span>}
                  {item.date&&<span className="badge badge-level">{item.date.slice(0,10)}</span>}
                  {item.level&&<span className="badge">{item.level}</span>}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {results && !results.ai && !loading && (
        <>
          <div className="result-bar" style={{marginBottom:10}}>
            <span>「{results.q}」共找到 <strong>{results.total}</strong> 条</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#94a3b8"}}>最多显示</span>
              <select value={limit} onChange={e=>{setLimit(Number(e.target.value));doSearch(q);}} style={{width:70,padding:"3px 6px",fontSize:12}}>
                {[10,20,50,100].map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>

          {results.error && <div style={{color:"#dc2626",fontSize:12,marginBottom:12}}>⚠️ {results.error}</div>}

          {results.items.length===0 && !results.error && (
            <div className="empty"><div className="empty-icon">🔎</div><div>未找到匹配结果</div>
              <div style={{fontSize:12,marginTop:8,color:"#94a3b8"}}>
                💡 提示：尝试更短的关键词，或运行 <code>python rebuild_fts.py</code> 重建索引
              </div>
            </div>
          )}

          <div>
            {results.items.map(item=>(
              <div key={item.id} className="fts-result-item" onClick={()=>setSelItem(item)}>
                <div className="fts-result-title">{item.title}</div>
                {item.snippet && (
                  <div className="fts-result-snippet">{item.snippet}</div>
                )}
                <div className="fts-result-meta">
                  <span className="badge badge-source">{item.source_name||"-"}</span>
                  {item.region&&item.region!=="全国"&&<span className="badge badge-region">{item.region}</span>}
                  {item.date&&<span className="badge badge-level">{item.date.slice(0,10)}</span>}
                  {item.status&&item.status!=="现行"&&<span className={`badge badge-status-${item.status}`}>{item.status}</span>}
                  {(item.version_count||0)>1&&<span className="badge-version">🔄 ×{item.version_count}</span>}
                  {(item.categories||[]).slice(0,2).map(c=>{
                    const i=CATEGORY_TYPES.indexOf(c);
                    return <span key={c} className="badge" style={{background:CAT_BG[i]||"#f1f5f9",color:CAT_COLORS[i]||"#64748b",border:`1px solid ${(CAT_COLORS[i]||"#64748b")}33`}}>{c}</span>;
                  })}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {!results && !loading && (
        <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}>
          <div style={{fontSize:36,marginBottom:10}}>{aiMode?"🤖":"🔍"}</div>
          <div style={{fontSize:13}}>{aiMode?"用自然语言提问，AI 将为您检索最相关的政策":"输入关键词开始全文搜索"}</div>
          <div style={{fontSize:11,marginTop:6}}>{aiMode?"AI 模式为付费功能 · 使用 GPT-4o-mini · 语义理解":"支持中文短语 · 覆盖政策全文内容（含正文存档）"}</div>
        </div>
      )}

      <ItemModal item={selItem} onClose={()=>setSelItem(null)} isLoggedIn={true}/>
    </div>
  );
}

function App() {
  const [authState,setAuth]     = useState("checking");
  const [username,setUser]      = useState("");
  const [userInfo,setUInfo]     = useState(null);
  const [view,setView]          = useState("dashboard");
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [stats,setStats]        = useState(null);
  const [regions,setRegions]    = useState([]);
  const [regionCounts,setRC]    = useState({});
  const [catCounts,setCC]       = useState({});
  const [sources,setSources]    = useState([]);
  const [unread,setUnread]      = useState(0);
  const [showAuth,setShowAuth]  = useState(false);
  const [compareItems,setCompare] = useState([]);  // 对比托盘 max 2
  const [nowStr,setNowStr]     = useState(()=>{
    const d=new Date();
    const p=n=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  });

  useEffect(()=>{
    const t=setInterval(()=>{
      const d=new Date();
      const p=n=>String(n).padStart(2,"0");
      setNowStr(`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`);
    },30000);
    return ()=>clearInterval(t);
  },[]);

  function addToCompare(item) {
    setCompare(prev => {
      if(prev.find(x=>x.id===item.id)) return prev;
      if(prev.length>=2) return [prev[1], item];
      return [...prev, item];
    });
  }
  function removeFromCompare(id) { setCompare(prev=>prev.filter(x=>x.id!==id)); }

  useEffect(()=>{
    fetch("/api/auth/me",{credentials:"include"}).then(r=>{
      if(r.status===401){setAuth("anon");return null;}
      return r.json();
    }).then(d=>{
      if(d){setUser(d.username);setUInfo(d);setAuth("authed");}
    }).catch(()=>setAuth("anon"));
  },[]);

  useEffect(()=>{
    if(authState!=="authed") return;
    fetch("/api/stats").then(r=>r.json()).then(setStats).catch(()=>{});
    fetch("/api/filters/meta").then(r=>r.json()).then(d=>{setRegions(d.regions||[]);setRC(d.region_counts||{});setCC(d.category_counts||{});}).catch(()=>{});
    fetch("/api/sources").then(r=>r.json()).then(setSources).catch(()=>{});
    fetch("/api/notifications/count",{credentials:"include"}).then(r=>r.json()).then(d=>setUnread(d.unread||0)).catch(()=>{});
  },[authState]);

  useEffect(()=>{
    if(authState!=="authed") return;
    const t = setInterval(()=>{
      fetch("/api/notifications/count",{credentials:"include"}).then(r=>r.json()).then(d=>setUnread(d.unread||0)).catch(()=>{});
    },60000);
    return ()=>clearInterval(t);
  },[authState]);

  async function handleLogout(){
    await fetch("/api/auth/logout",{method:"POST",credentials:"include"});
    setAuth("anon"); setUser(""); setUInfo(null);
  }

  // ── 状态路由 ──────────────────────────────────────────
  if(authState==="checking") return <div className="loading" style={{paddingTop:120}}><div className="spinner"/><div>验证登录状态…</div></div>;

  // 未登录 → 公开模式（含弹出登录框）
  if(authState==="anon") {
    return (
      <>
        <PublicApp onLogin={()=>setShowAuth(true)}/>
        {showAuth && (
          <AuthModal
            onLogin={(u)=>{setUser(u);setAuth("authed");setShowAuth(false);}}
            onClose={()=>setShowAuth(false)}
          />
        )}
      </>
    );
  }

  // ── 已登录 ────────────────────────────────────────────
  const VIEWS = [
    {id:"dashboard",label:"📊 Dashboard"},
    {id:"list",     label:"📋 政策列表"},
    {id:"search",   label:"🔍 问政策"},
    {id:"province-compare",label:"⚖️ 省份对比"},
    {id:"bookmarks",label:"⭐ 收藏夹"},
    {id:"sources",  label:"📡 数据源"},
    {id:"notifs",   label:"🔔 通知"},
    {id:"subs",     label:"📬 订阅"},
    // {id:"scope", label:"🧭 项目配置"},  // 暂隐藏，功能未联动
  ];

  return (
    <div>
      <header className="app-header">
        <div className="header-left">
          <button className="hamburger-btn" onClick={()=>setSidebarOpen(true)} aria-label="打开导航">☰</button>
          <div className="logo">⚡ 储能政策情报看板 <span className="logo-sub">China Energy Storage Policy Intel</span></div>
        </div>
        <div className="header-right">
          <div className="header-stats">
            {stats&&<><span>📦 <strong>{stats.total}</strong></span><span>📅 近7天 <strong>{stats.recent_7d}</strong></span><span style={{color:"#4ade80"}}>● 本地运行</span></>}
          </div>
          <div className="header-time">🕒 {nowStr}</div>
          <div className="user-badge" title={username}>
            <span className="user-avatar">{(username||"U").slice(0,1).toUpperCase()}</span>
            <span className="user-name"><strong>{username}</strong></span>
          </div>
          <button className="btn-logout" onClick={handleLogout}>退出</button>
        </div>
      </header>

      <div className="app-shell">
        {sidebarOpen && <div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)} />}
        <aside className={`nav-sidebar ${sidebarOpen ? "open" : ""}`}>
          <div className="nav-title">导航</div>
          <div className="nav-items">
            {VIEWS.map(v=>{
              const active = view===v.id;
              return (
                <button
                  key={v.id}
                  className={`nav-item ${active?"active":""}`}
                  onClick={()=>{ setView(v.id); setSidebarOpen(false); }}
                >
                  <span className="nav-item-label">
                    {v.label}
                    {v.id==="notifs"&&unread>0&&<span className="notif-badge" style={{marginLeft:8}}>{unread}</span>}
                  </span>
                  {active && <span className="nav-item-glow" />}
                </button>
              );
            })}
          </div>
          <div className="nav-footer">
            <div className="nav-foot-stat">
              <span className="k">总条目</span>
              <span className="v">{stats?.total ?? "-"}</span>
            </div>
            <div className="nav-foot-stat">
              <span className="k">近7天</span>
              <span className="v">{stats?.recent_7d ?? "-"}</span>
            </div>
            <div className="nav-foot-hint">提示：列表页支持多维筛选 + 版本追踪 + AI解读</div>
          </div>
        </aside>

        <main className="app-main">
          {view==="dashboard"&&<DashboardView stats={stats} onViewAll={()=>setView("list")}/>}
          {view==="list"&&<ListView catCounts={catCounts} regions={regions} regionCounts={regionCounts} sources={sources} onAddToCompare={addToCompare} compareIds={compareItems.map(x=>x.id)}/>}
          {view==="search"&&<SearchView/>}
          {view==="province-compare"&&<ProvinceCompareView/>}
          {view==="bookmarks"&&<BookmarksView/>}
          {view==="sources"&&<SourceStatusView/>}
          {view==="notifs"&&<NotificationsView onUnreadChange={n=>{setUnread(n);}}/>}
          {view==="subs"&&<SubscriptionsView smtpConfigured={userInfo?.smtp_configured||false}/>}
          {view==="scope"&&<ScopeView/>}
        </main>
      </div>

      {compareItems.length>0&&<CompareBar items={compareItems} onRemove={removeFromCompare} onClear={()=>setCompare([])}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
