app = "policy-intel"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data/policy.db"
  PORT    = "8080"

[mounts]
  source      = "policy_data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol      = "tcp"

  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
